# Import Boundary Allowlist
#
# Documents known import boundary violations that represent intentional
# architectural decisions. Each entry requires a tracking issue URL.
#
# Format:
#   [[allow]]
#   file = "substring match on relative file path"
#   import = "prefix match on imported module"
#   issue = "URL tracking the resolution of this violation"
#
# These violations exist because datrix-codegen-common contains
# language-specific transpiler implementations that by nature import
# from the target language packages. The proper long-term fix is to
# move these files to their respective language generator packages.
# See: datrix-common/docs/architecture/import-boundaries.md

