# Import Boundary Allowlist
#
# Documents known import boundary violations that represent intentional
# architectural decisions. Each entry requires a tracking issue URL.
#
# Format: each entry is a TOML array-of-tables block named "allow" with:
#   file = "substring match on relative file path"
#   import = "prefix match on imported module"
#   issue = "URL tracking the resolution of this violation"
#
# This allowlist is EMPTY -- the terminal state required by design 023
# Invariant I7 ("Import-boundary allowlist empty"), reached in task 09-19.
# Guarded by:
#   datrix-codegen-common/tests/integration/dev/test_import_boundary_allowlist_empty.py
#   datrix-codegen-common/tests/unit/architecture/test_no_concrete_target_imports.py
# Adding a new allow entry is a design-023 regression; fix the import at
# its root (plugin seam / relocation) instead.
