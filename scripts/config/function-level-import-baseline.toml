# Function-Level-Import Ratchet Baseline (design 029, D4/I6, task 17-09)
#
# Frozen per-file counts of function-level imports (any Import/ImportFrom
# AST node that is not a direct top-level statement of its module --
# nested in a function/method body, an `if TYPE_CHECKING:` block, or a
# `try`/`except`) in datrix-common's src/ tree ONLY. Design 029's D4 calls
# for these to "move back to module top with a ratchet": this baseline
# freezes the count measured immediately after tasks 17-07/17-08 (the
# Service/Shared decomposition) landed, so it reflects their import
# relocations rather than a stale pre-decomposition number. Any INCREASE
# in a file's count fails datrix/scripts/dev/check-import-boundaries.py
# --check-function-level-imports. Decreases are always allowed and should
# be captured by re-running with --update-baseline once a later task
# promotes more deferred imports back to module top -- D4's own decision
# log explicitly rejects a one-shot sweep of all sites; each area migrates
# with the work that next touches it.
#
# Format:
#   [[baseline]]
#   file = "path/relative/to/monorepo-root, forward slashes"
#   count = <int>

