components:
  schemas:
    Category:
      type: object
      properties:
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        id:
          type: string
          format: uuid
        name:
          type: string
          maxLength: 100
        slug:
          $ref: '#/components/schemas/Slug'
        description:
          $ref: '#/components/schemas/String(500)?'
      required:
      - createdAt
      - updatedAt
      - id
      - name
      - slug
    User:
      type: object
      properties:
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        id:
          type: string
          format: uuid
        email:
          type: string
          maxLength: 255
        passwordHash:
          type: string
          format: password
        role:
          $ref: '#/components/schemas/UserRole'
      required:
      - createdAt
      - updatedAt
      - id
      - email
      - passwordHash
      - role
    Tag:
      type: object
      properties:
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        id:
          type: string
          format: uuid
        name:
          type: string
          maxLength: 50
        description:
          $ref: '#/components/schemas/String(200)?'
      required:
      - createdAt
      - updatedAt
      - id
      - name
    BookTag:
      type: object
      properties:
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        id:
          type: string
          format: uuid
      required:
      - createdAt
      - updatedAt
      - id
    Branch:
      type: object
      properties:
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        id:
          type: string
          format: uuid
        name:
          type: string
          maxLength: 200
        latitude:
          $ref: '#/components/schemas/Latitude'
        longitude:
          $ref: '#/components/schemas/Longitude'
        country:
          $ref: '#/components/schemas/CountryCode'
        postalCode:
          $ref: '#/components/schemas/PostalCode?'
      required:
      - createdAt
      - updatedAt
      - id
      - name
      - latitude
      - longitude
      - country
    ShelfLocation:
      type: object
      properties:
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        id:
          type: string
          format: uuid
        aisle:
          type: string
          maxLength: 50
        shelf:
          type: string
          maxLength: 10
        capacity:
          $ref: '#/components/schemas/Integer'
      required:
      - createdAt
      - updatedAt
      - id
      - aisle
      - shelf
      - capacity
    Book:
      type: object
      properties:
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        id:
          type: string
          format: uuid
        createdBy:
          type: string
          format: uuid
        updatedBy:
          $ref: '#/components/schemas/UUID?'
        deletedAt:
          $ref: '#/components/schemas/DateTime?'
        deletedBy:
          $ref: '#/components/schemas/UUID?'
        title:
          type: string
          maxLength: 200
        isbn:
          type: string
        author:
          type: string
          maxLength: 100
        publicationYear:
          $ref: '#/components/schemas/Integer'
        publishDate:
          type: string
          format: date
        status:
          $ref: '#/components/schemas/BookStatus'
        format:
          $ref: '#/components/schemas/BookFormat'
        catalogNumber:
          $ref: '#/components/schemas/String(50)?'
        keywords:
          type: array
          items:
            type: string
        rating:
          $ref: '#/components/schemas/Decimal(3, 2)'
        price:
          $ref: '#/components/schemas/Money'
        metadata:
          $ref: '#/components/schemas/Map<String, String>'
        tags:
          $ref: '#/components/schemas/Set<String>'
        condition:
          $ref: '#/components/schemas/BookCondition'
        renewalCount:
          $ref: '#/components/schemas/Integer'
      required:
      - createdAt
      - updatedAt
      - id
      - createdBy
      - title
      - isbn
      - author
      - publicationYear
      - publishDate
      - status
      - format
      - keywords
      - rating
      - price
      - metadata
      - tags
      - condition
      - renewalCount
    Review:
      type: object
      properties:
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        id:
          type: string
          format: uuid
        rating:
          $ref: '#/components/schemas/Integer'
        comment:
          $ref: '#/components/schemas/Text?'
      required:
      - createdAt
      - updatedAt
      - id
      - rating
    Checkout:
      type: object
      properties:
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        id:
          type: string
          format: uuid
        createdBy:
          type: string
          format: uuid
        updatedBy:
          $ref: '#/components/schemas/UUID?'
        checkoutDate:
          type: string
          format: date-time
        dueDate:
          type: string
          format: date-time
        returnDate:
          $ref: '#/components/schemas/DateTime?'
        renewals:
          $ref: '#/components/schemas/Integer'
      required:
      - createdAt
      - updatedAt
      - id
      - createdBy
      - checkoutDate
      - dueDate
      - renewals
    BookAttachment:
      type: object
      properties:
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        id:
          type: string
          format: uuid
        filename:
          type: string
          maxLength: 200
        contentType:
          type: string
          maxLength: 100
        fileSize:
          $ref: '#/components/schemas/Integer'
        storagePath:
          type: string
          maxLength: 500
        description:
          $ref: '#/components/schemas/String?'
      required:
      - createdAt
      - updatedAt
      - id
      - filename
      - contentType
      - fileSize
      - storagePath
    BookAuditLog:
      type: object
      properties:
        id:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        bookId:
          type: string
          format: uuid
        action:
          $ref: '#/components/schemas/AuditAction'
        performedBy:
          $ref: '#/components/schemas/String(100)?'
        changes:
          $ref: '#/components/schemas/JSON?'
        occurredAt:
          type: string
          format: date-time
      required:
      - id
      - createdAt
      - bookId
      - action
      - occurredAt
    DailyBookStats:
      type: object
      properties:
        id:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        reportDate:
          type: string
          format: date-time
        totalCheckouts:
          $ref: '#/components/schemas/Integer'
        totalReturns:
          $ref: '#/components/schemas/Integer'
        newBooks:
          $ref: '#/components/schemas/Integer'
        activeMembers:
          $ref: '#/components/schemas/Integer'
        generatedAt:
          type: string
          format: date-time
      required:
      - id
      - createdAt
      - reportDate
      - totalCheckouts
      - totalReturns
      - newBooks
      - activeMembers
      - generatedAt
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
