openapi: 3.1.0
info:
  title: library.LoanService API
  version: 1.0.0
paths:
  /api/v1/loans:
    post:
      operationId: post
      summary: post
      security:
      - bearerAuth: []
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
  /api/v1/loans/member/:memberId:
    get:
      operationId: get
      summary: get
      security:
      - bearerAuth: []
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
components:
  schemas:
    Loan:
      type: object
      properties:
        id:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        bookId:
          type: string
          format: uuid
        memberId:
          type: string
          format: uuid
        status:
          $ref: '#/components/schemas/LoanStatus'
        dueDate:
          type: string
          format: date-time
        returnedAt:
          $ref: '#/components/schemas/DateTime?'
      required:
      - id
      - createdAt
      - updatedAt
      - bookId
      - memberId
      - status
      - dueDate
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
