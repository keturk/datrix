test:
  jobs:
    CleanupExpiredIdempotencyKeys:
      schedule: '0 * * * *'
      retry: { maxAttempts: 1, backoff: fixed }
      timeout: 30s

development:
  jobs:
    CleanupExpiredIdempotencyKeys:
      schedule: '0 * * * *'
      retry: { maxAttempts: 1, backoff: fixed }
      timeout: 30s

production:
  jobs:
    CleanupExpiredIdempotencyKeys:
      schedule: '0 * * * *'
      retry: { maxAttempts: 3, backoff: exponential }
      timeout: 5m
