asyncapi: 3.0.0
info:
  title: ecommerce.ProductService Events
  version: 1.0.0
channels:
  ProductEvents:
    address: ProductEvents
    messages:
      ProductCreated:
        payload:
          type: object
          properties:
            productId:
              type: string
              format: uuid
            name:
              type: string
            price:
              $ref: '#/components/schemas/Money'
          required:
          - productId
          - name
          - price
      InventoryUpdated:
        payload:
          type: object
          properties:
            productId:
              type: string
              format: uuid
            oldQuantity:
              $ref: '#/components/schemas/Integer'
            newQuantity:
              $ref: '#/components/schemas/Integer'
          required:
          - productId
          - oldQuantity
          - newQuantity
      InventoryReserved:
        payload:
          type: object
          properties:
            reservationId:
              type: string
              format: uuid
            productIds:
              $ref: '#/components/schemas/Array<UUID>'
          required:
          - reservationId
          - productIds
      InventoryReleased:
        payload:
          type: object
          properties:
            reservationId:
              type: string
              format: uuid
            reason:
              type: string
          required:
          - reservationId
          - reason
operations:
  publishProductCreated:
    action: send
    channel:
      $ref: '#/channels/ProductEvents'
  publishInventoryUpdated:
    action: send
    channel:
      $ref: '#/channels/ProductEvents'
  publishInventoryReserved:
    action: send
    channel:
      $ref: '#/channels/ProductEvents'
  publishInventoryReleased:
    action: send
    channel:
      $ref: '#/channels/ProductEvents'
  onProductCreated:
    action: receive
    channel:
      $ref: '#/channels/ProductEvents'
  onInventoryUpdated:
    action: receive
    channel:
      $ref: '#/channels/ProductEvents'
  onInventoryReserved:
    action: receive
    channel:
      $ref: '#/channels/ProductEvents'
  onInventoryReleased:
    action: receive
    channel:
      $ref: '#/channels/ProductEvents'
  onOrderConfirmed:
    action: receive
    channel:
      $ref: '#/channels/OrderEvents'
  onOrderCancelled:
    action: receive
    channel:
      $ref: '#/channels/OrderEvents'
