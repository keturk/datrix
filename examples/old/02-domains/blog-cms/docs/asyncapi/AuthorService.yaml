asyncapi: 3.0.0
info:
  title: blog.AuthorService Events
  version: 1.0.0
channels:
  AuthorEvents:
    address: AuthorEvents
    messages:
      AuthorRegistered:
        payload:
          type: object
          properties:
            authorId:
              type: string
              format: uuid
            email:
              type: string
              format: email
            fullName:
              type: string
          required:
          - authorId
          - email
          - fullName
      AuthorStatusChanged:
        payload:
          type: object
          properties:
            authorId:
              type: string
              format: uuid
            oldStatus:
              type: string
            newStatus:
              type: string
          required:
          - authorId
          - oldStatus
          - newStatus
operations:
  publishAuthorRegistered:
    action: send
    channel:
      $ref: '#/channels/AuthorEvents'
  publishAuthorStatusChanged:
    action: send
    channel:
      $ref: '#/channels/AuthorEvents'
