components:
  schemas:
    MedicalRecord:
      type: object
      properties:
        createdBy:
          $ref: '#/components/schemas/UUID?'
        updatedBy:
          $ref: '#/components/schemas/UUID?'
        changeReason:
          $ref: '#/components/schemas/String?'
        id:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        isConfidential:
          type: boolean
        accessLevel:
          $ref: '#/components/schemas/String?'
        patientId:
          type: string
          format: uuid
        appointmentId:
          $ref: '#/components/schemas/UUID?'
        providerId:
          $ref: '#/components/schemas/UUID?'
        providerName:
          type: string
          maxLength: 100
        type:
          $ref: '#/components/schemas/RecordType'
        status:
          $ref: '#/components/schemas/RecordStatus'
        title:
          type: string
          maxLength: 200
        content:
          type: string
        recordDate:
          type: string
          format: date-time
        metadata:
          $ref: '#/components/schemas/JSON?'
        attachments:
          type: object
      required:
      - id
      - createdAt
      - updatedAt
      - isConfidential
      - patientId
      - providerName
      - type
      - status
      - title
      - content
      - recordDate
      - attachments
    Prescription:
      type: object
      properties:
        id:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        patientId:
          type: string
          format: uuid
        appointmentId:
          $ref: '#/components/schemas/UUID?'
        providerId:
          $ref: '#/components/schemas/UUID?'
        prescribingDoctor:
          type: string
          maxLength: 100
        medicationName:
          type: string
          maxLength: 200
        dosage:
          $ref: '#/components/schemas/String(100)?'
        frequency:
          $ref: '#/components/schemas/String(100)?'
        route:
          $ref: '#/components/schemas/String(100)?'
        instructions:
          $ref: '#/components/schemas/String(500)?'
        quantity:
          $ref: '#/components/schemas/Integer'
        refillsAllowed:
          $ref: '#/components/schemas/Integer'
        refillsUsed:
          $ref: '#/components/schemas/Integer'
        startDate:
          type: string
          format: date-time
        endDate:
          $ref: '#/components/schemas/DateTime?'
        status:
          $ref: '#/components/schemas/PrescriptionStatus'
        pharmacyName:
          $ref: '#/components/schemas/String?'
        pharmacyPhone:
          $ref: '#/components/schemas/Phone?'
        discontinuationReason:
          $ref: '#/components/schemas/String?'
      required:
      - id
      - createdAt
      - updatedAt
      - patientId
      - prescribingDoctor
      - medicationName
      - quantity
      - refillsAllowed
      - refillsUsed
      - startDate
      - status
    Attachment:
      type: object
      properties:
        id:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        filename:
          type: string
          maxLength: 200
        contentType:
          type: string
          maxLength: 100
        fileSize:
          $ref: '#/components/schemas/Integer'
        storagePath:
          type: string
          maxLength: 500
        description:
          $ref: '#/components/schemas/String?'
      required:
      - id
      - createdAt
      - updatedAt
      - filename
      - contentType
      - fileSize
      - storagePath
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
