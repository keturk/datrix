test:
  port: 80

  rateLimit:
    default: { requests: 100, window: 1m, key: ip }
    UserAPI.public: { requests: 10, window: 1m, key: ip }
    OrderAPI: { requests: 50, window: 1m, key: user }
    PaymentAPI: { requests: 20, window: 1m, key: user }

  auth:
    jwt:
      algorithm: HS256
      issuer: ecommerce-platform
      expiresIn: 86400
      exclude: [/health, "publicRoutes"]

  cors:
    origins: [http://localhost:3000, https://shop.example.com, https://admin.example.com]
    methods: [GET, POST, PUT, DELETE, PATCH]
    headers: [Content-Type, Authorization, X-Idempotency-Key]
    allowCredentials: true
    maxAge: 86400

  transform:
    request:
      addHeader: { X-Gateway-Version: "1.0" }
    response:
      removeHeader: [X-Powered-By]

