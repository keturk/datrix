test:
  language: python
  hosting: docker
  defaultTimeout: 30000
  maxPageSize: 100
  defaultLocale: en-US
  timezone: UTC
  env:
    DEBUG: false
    CORS_ORIGINS: '["*"]'
    SECRETS_BACKEND: environment
  secrets:
    provider: env
development:
  language: python
  hosting: docker
  defaultTimeout: 30000
  maxPageSize: 100
  defaultLocale: en-US
  timezone: UTC
  env:
    DEBUG: false
    CORS_ORIGINS: '["*"]'
    SECRETS_BACKEND: environment
  secrets:
    provider: env
production:
  language: python
  hosting: aws
  defaultTimeout: 30000
  maxPageSize: 100
  defaultLocale: en-US
  timezone: UTC
  region: us-east-1
  secrets:
    provider: vault
    path: secret/ecommerce
