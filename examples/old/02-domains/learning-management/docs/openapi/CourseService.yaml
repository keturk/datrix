openapi: 3.1.0
info:
  title: learning.CourseService API
  version: 1.0.0
paths:
  /api/v1/courses/courses:
    get:
      operationId: list_courses
      summary: list_courses
      security:
      - bearerAuth: []
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
    post:
      operationId: create_course
      summary: create_course
      security:
      - bearerAuth: []
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
  /api/v1/courses/courses/:id:
    get:
      operationId: get_course
      summary: get_course
      security:
      - bearerAuth: []
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
    put:
      operationId: update_course
      summary: update_course
      security:
      - bearerAuth: []
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
    delete:
      operationId: delete_course
      summary: delete_course
      security:
      - bearerAuth: []
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
components:
  schemas:
    Course:
      type: object
      properties:
        id:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        title:
          type: string
          maxLength: 200
        code:
          type: string
          maxLength: 20
        description:
          $ref: '#/components/schemas/Text?'
      required:
      - id
      - createdAt
      - updatedAt
      - title
      - code
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
