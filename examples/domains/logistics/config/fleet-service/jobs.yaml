test:
  jobs:
    CheckMaintenanceSchedule:
      schedule: '0 6 * * *'
      retry: { maxAttempts: 1, backoff: fixed }
      timeout: 60s
    UpdateFleetMetrics:
      schedule: '*/15 * * * *'
      retry: { maxAttempts: 1, backoff: fixed }
      timeout: 30s

development:
  jobs:
    CheckMaintenanceSchedule:
      schedule: '0 6 * * *'
      retry: { maxAttempts: 1, backoff: fixed }
      timeout: 60s
    UpdateFleetMetrics:
      schedule: '*/15 * * * *'
      retry: { maxAttempts: 1, backoff: fixed }
      timeout: 30s

production:
  jobs:
    CheckMaintenanceSchedule:
      schedule: '0 6 * * *'
      retry: { maxAttempts: 3, backoff: exponential }
      timeout: 5m
    UpdateFleetMetrics:
      schedule: '*/5 * * * *'
      retry: { maxAttempts: 3, backoff: exponential }
      timeout: 2m
