test:
  jobs:
    CheckAlertRules:
      schedule: '*/5 * * * *'
      retry: { maxAttempts: 1, backoff: fixed }
      timeout: 60s
    AggregateHourlyStats:
      schedule: '0 * * * *'
      retry: { maxAttempts: 1, backoff: fixed }
      timeout: 120s

development:
  jobs:
    CheckAlertRules:
      schedule: '*/5 * * * *'
      retry: { maxAttempts: 1, backoff: fixed }
      timeout: 60s
    AggregateHourlyStats:
      schedule: '0 * * * *'
      retry: { maxAttempts: 1, backoff: fixed }
      timeout: 120s

production:
  jobs:
    CheckAlertRules:
      schedule: '*/2 * * * *'
      retry: { maxAttempts: 3, backoff: exponential }
      timeout: 5m
    AggregateHourlyStats:
      schedule: '5 * * * *'
      retry: { maxAttempts: 3, backoff: exponential }
      timeout: 10m
