openapi: 3.1.0
info:
  title: blog.CommentService API
  version: 1.0.0
paths:
  /api/v1/comments/comments/:id:
    get:
      operationId: get_comment
      summary: get_comment
      security:
      - bearerAuth: []
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
  /api/v1/comments/:
    get:
      operationId: get
      summary: get
      security:
      - bearerAuth: []
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
components:
  schemas:
    Comment:
      type: object
      properties:
        id:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        contentId:
          type: string
          format: uuid
        authorName:
          type: string
          maxLength: 100
        authorEmail:
          type: string
          format: email
        body:
          type: string
        status:
          $ref: '#/components/schemas/CommentStatus'
        authorId:
          $ref: '#/components/schemas/UUID?'
        likeCount:
          $ref: '#/components/schemas/Integer'
        replyCount:
          $ref: '#/components/schemas/Integer'
      required:
      - id
      - createdAt
      - updatedAt
      - contentId
      - authorName
      - authorEmail
      - body
      - status
      - likeCount
      - replyCount
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
