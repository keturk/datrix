components:
  schemas:
    Appointment:
      type: object
      properties:
        id:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        patientId:
          type: string
          format: uuid
        providerId:
          $ref: '#/components/schemas/UUID?'
        providerName:
          type: string
          maxLength: 100
        department:
          $ref: '#/components/schemas/String(100)?'
        location:
          $ref: '#/components/schemas/String(100)?'
        type:
          $ref: '#/components/schemas/AppointmentType'
        status:
          $ref: '#/components/schemas/AppointmentStatus'
        scheduledAt:
          type: string
          format: date-time
        startedAt:
          $ref: '#/components/schemas/DateTime?'
        completedAt:
          $ref: '#/components/schemas/DateTime?'
        durationMinutes:
          $ref: '#/components/schemas/Integer'
        reason:
          $ref: '#/components/schemas/String(500)?'
        notes:
          $ref: '#/components/schemas/String(1000)?'
        cancellationReason:
          $ref: '#/components/schemas/String(500)?'
        reminderSent:
          type: boolean
        reminderSentAt:
          $ref: '#/components/schemas/DateTime?'
      required:
      - id
      - createdAt
      - updatedAt
      - patientId
      - providerName
      - type
      - status
      - scheduledAt
      - durationMinutes
      - reminderSent
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
