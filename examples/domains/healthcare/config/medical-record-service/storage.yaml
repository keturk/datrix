test:
  provider: s3
  bucket: healthcare-records
  region: us-east-1
  encryption: AES256
  folders:
    attachments:
      path: attachments/{patientId}/{recordId}
      allowedTypes:
      - application/pdf
      - image/jpeg
      - image/png
      - image/dicom
      maxSize: 50MB
      private: true
    images:
      path: images/{patientId}
      allowedTypes:
      - image/jpeg
      - image/png
      - image/dicom
      maxSize: 100MB
      private: true
  platform: minio
