test:
  defaults:
    timeout: 10s
    retry:
      maxAttempts: 2
      backoff:
        type: exponential
        initial: 100ms
        multiplier: 2
        max: 2s
        jitter: 0.1
      retryableErrors: [ConnectionError, TimeoutError, ServiceUnavailable]
      nonRetryableErrors: [ValidationError, AuthenticationError]

  config:
    PatientService:
      timeout: 5s
      retry:
        maxAttempts: 2
        backoff: { type: exponential, initial: 100ms, multiplier: 2, max: 2s }
      circuitBreaker:
        failureThreshold: 5
        successThreshold: 3
        timeout: 30s
        halfOpenRequests: 3
      fallback:
        type: handler
        handler: handlePatientFallback

