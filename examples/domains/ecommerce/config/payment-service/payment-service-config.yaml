test:
  platform: compose
  port: 8003
  tracing:
    level: full
  replicas: 5
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: '1'
      memory: 1Gi
  healthCheck:
    type: http
    path: /health
    initialDelay: 15s
    period: 10s
    failureThreshold: 3
    successThreshold: 1
  readinessCheck:
    type: http
    path: /ready
    initialDelay: 5s
    period: 5s
development:
  platform: compose
  port: 8003
  tracing:
    level: full
  replicas: 5
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: '1'
      memory: 1Gi
  healthCheck:
    type: http
    path: /health
    initialDelay: 15s
    period: 10s
    failureThreshold: 3
    successThreshold: 1
  readinessCheck:
    type: http
    path: /ready
    initialDelay: 5s
    period: 5s
production:
  platform: ecs-fargate
  port: 8003
  tracing:
    level: full
  strategy:
    blueGreen:
      timeout: 10m
      validateBefore: true
      autoPromote: false
      scaleDownDelay: 30m
      validation:
        tests:
        - /health
        - /api/v1/payments/validate
        successThreshold: 100%
        timeout: 5m
  replicas: 5
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: '1'
      memory: 1Gi
  healthCheck:
    type: http
    path: /health
    initialDelay: 15s
    period: 10s
    failureThreshold: 3
    successThreshold: 1
  readinessCheck:
    type: http
    path: /ready
    initialDelay: 5s
    period: 5s
  rollback:
    automatic: true
    revisionHistory: 5
  scaling:
    replicas:
      min: 5
      max: 20
    triggers:
    - metric: cpu
      target: 70%
    - metric: memory
      target: 80%
