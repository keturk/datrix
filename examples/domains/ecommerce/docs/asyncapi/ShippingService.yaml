asyncapi: 3.0.0
info:
  title: ecommerce.ShippingService Events
  version: 1.0.0
channels:
  ShipmentEvents:
    address: ShipmentEvents
    messages:
      ShipmentCreated:
        payload:
          type: object
          properties:
            shipmentId:
              type: string
              format: uuid
            orderId:
              type: string
              format: uuid
          required:
          - shipmentId
          - orderId
      ShipmentDispatched:
        payload:
          type: object
          properties:
            shipmentId:
              type: string
              format: uuid
            orderId:
              type: string
              format: uuid
            trackingNumber:
              type: string
          required:
          - shipmentId
          - orderId
          - trackingNumber
      ShipmentDelivered:
        payload:
          type: object
          properties:
            shipmentId:
              type: string
              format: uuid
            orderId:
              type: string
              format: uuid
            deliveredAt:
              type: string
              format: date-time
          required:
          - shipmentId
          - orderId
          - deliveredAt
      ShipmentFailed:
        payload:
          type: object
          properties:
            shipmentId:
              type: string
              format: uuid
            orderId:
              type: string
              format: uuid
            reason:
              type: string
          required:
          - shipmentId
          - orderId
          - reason
operations:
  publishShipmentCreated:
    action: send
    channel:
      $ref: '#/channels/ShipmentEvents'
  publishShipmentDispatched:
    action: send
    channel:
      $ref: '#/channels/ShipmentEvents'
  publishShipmentDelivered:
    action: send
    channel:
      $ref: '#/channels/ShipmentEvents'
  publishShipmentFailed:
    action: send
    channel:
      $ref: '#/channels/ShipmentEvents'
  onOrderConfirmed:
    action: receive
    channel:
      $ref: '#/channels/OrderEvents'
