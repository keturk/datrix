asyncapi: 3.0.0
info:
  title: ecommerce.OrderService Events
  version: 1.0.0
channels:
  OrderEvents:
    address: OrderEvents
    messages:
      OrderCreated:
        payload:
          type: object
          properties:
            orderId:
              type: string
              format: uuid
            orderNumber:
              type: string
            customerId:
              type: string
              format: uuid
            total:
              $ref: '#/components/schemas/Money'
            reservationId:
              type: string
              format: uuid
          required:
          - orderId
          - orderNumber
          - customerId
          - total
          - reservationId
      OrderConfirmed:
        payload:
          type: object
          properties:
            orderId:
              type: string
              format: uuid
            paymentId:
              $ref: '#/components/schemas/UUID?'
            reservationId:
              type: string
              format: uuid
            shippingAddress:
              $ref: '#/components/schemas/Address'
            items:
              $ref: '#/components/schemas/Array<JSON>'
            estimatedWeight:
              type: number
              format: decimal
          required:
          - orderId
          - paymentId
          - reservationId
          - shippingAddress
          - items
          - estimatedWeight
      OrderCancelled:
        payload:
          type: object
          properties:
            orderId:
              type: string
              format: uuid
            reason:
              type: string
            reservationId:
              type: string
              format: uuid
          required:
          - orderId
          - reason
          - reservationId
      OrderStatusChanged:
        payload:
          type: object
          properties:
            orderId:
              type: string
              format: uuid
            oldStatus:
              $ref: '#/components/schemas/OrderStatus'
            newStatus:
              $ref: '#/components/schemas/OrderStatus'
          required:
          - orderId
          - oldStatus
          - newStatus
operations:
  publishOrderCreated:
    action: send
    channel:
      $ref: '#/channels/OrderEvents'
  publishOrderConfirmed:
    action: send
    channel:
      $ref: '#/channels/OrderEvents'
  publishOrderCancelled:
    action: send
    channel:
      $ref: '#/channels/OrderEvents'
  publishOrderStatusChanged:
    action: send
    channel:
      $ref: '#/channels/OrderEvents'
  onOrderStatusChanged:
    action: receive
    channel:
      $ref: '#/channels/OrderEvents'
  onPaymentProcessed:
    action: receive
    channel:
      $ref: '#/channels/PaymentEvents'
  onPaymentFailed:
    action: receive
    channel:
      $ref: '#/channels/PaymentEvents'
  onPaymentRefunded:
    action: receive
    channel:
      $ref: '#/channels/PaymentEvents'
  onShipmentCreated:
    action: receive
    channel:
      $ref: '#/channels/ShipmentEvents'
  onShipmentDispatched:
    action: receive
    channel:
      $ref: '#/channels/ShipmentEvents'
  onShipmentDelivered:
    action: receive
    channel:
      $ref: '#/channels/ShipmentEvents'
  onShipmentFailed:
    action: receive
    channel:
      $ref: '#/channels/ShipmentEvents'
