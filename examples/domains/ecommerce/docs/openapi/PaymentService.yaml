openapi: 3.1.0
info:
  title: ecommerce.PaymentService API
  version: 1.0.0
paths:
  /api/v1/payments/payments/:id:
    get:
      operationId: get_payment
      summary: get_payment
      security:
      - bearerAuth: []
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
  /api/v1/payments/order/:orderId:
    get:
      operationId: get
      summary: get
      security:
      - bearerAuth: []
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
  /api/v1/payments/my-payments:
    get:
      operationId: get
      summary: get
      security:
      - bearerAuth: []
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
  /api/v1/payments/process:
    post:
      operationId: post
      summary: post
      security:
      - bearerAuth: []
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
  /api/v1/payments/:id/refund:
    post:
      operationId: post
      summary: post
      security:
      - bearerAuth: []
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
  /api/v1/payments/webhook/stripe:
    post:
      operationId: post
      summary: post
      security:
      - bearerAuth: []
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
components:
  schemas:
    Payment:
      type: object
      properties:
        id:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        orderId:
          type: string
          format: uuid
        customerId:
          type: string
          format: uuid
        amount:
          $ref: '#/components/schemas/Money'
        method:
          $ref: '#/components/schemas/PaymentMethod'
        status:
          $ref: '#/components/schemas/PaymentStatus'
        transactionId:
          type: string
          maxLength: 100
        gatewayResponse:
          $ref: '#/components/schemas/String?'
        errorMessage:
          $ref: '#/components/schemas/String?'
        processedAt:
          $ref: '#/components/schemas/DateTime?'
      required:
      - id
      - createdAt
      - updatedAt
      - orderId
      - customerId
      - amount
      - method
      - status
      - transactionId
    Refund:
      type: object
      properties:
        id:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        amount:
          $ref: '#/components/schemas/Money'
        reason:
          type: string
          maxLength: 500
        status:
          $ref: '#/components/schemas/PaymentStatus'
        refundTransactionId:
          $ref: '#/components/schemas/String?'
        errorMessage:
          $ref: '#/components/schemas/String?'
        processedAt:
          $ref: '#/components/schemas/DateTime?'
      required:
      - id
      - createdAt
      - updatedAt
      - amount
      - reason
      - status
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
