groups:
  - name: ecommerce.PaymentService-alerts
    rules:
      - alert: db_query_duration_high
        expr: histogram_quantile(0.95, rate(db_query_duration_bucket[5m])) > 0.2
        for: 5m
        labels:
          severity: warning
          service: ecommerce.PaymentService
          block: db
        annotations:
          summary: "db.queryDuration p95 exceeds 200.0ms"
          description: "p95(db_query_duration) over 5m > 200.0ms"
      - alert: db_transaction_duration_high
        expr: histogram_quantile(0.99, rate(db_transaction_duration_bucket[1m])) > 2.0
        for: 1m
        labels:
          severity: critical
          service: ecommerce.PaymentService
          block: db
        annotations:
          summary: "db.transactionDuration p99 exceeds 2.0s"
          description: "p99(db_transaction_duration) over 1m > 2.0s"
      - alert: mq_failed_messages_high
        expr: increase(mq_failed_messages_total[5m]) > 5.0
        for: 5m
        labels:
          severity: critical
          service: ecommerce.PaymentService
          block: mq
        annotations:
          summary: "mq.failedMessages count exceeds 5.0"
          description: "count(mq_failed_messages) over 5m > 5.0"
