test:
  defaults:
    timeout: 15s
    retry:
      maxAttempts: 3
      backoff:
        type: exponential
        initial: 200ms
        multiplier: 2
        max: 5s
        jitter: 0.1
      retryableErrors: [ConnectionError, TimeoutError, ServiceUnavailable]
      nonRetryableErrors: [ValidationError, AuthenticationError, NotFound]

  config:
    ProductService:
      timeout: 10s
      retry:
        maxAttempts: 3
        backoff: { type: exponential, initial: 100ms, multiplier: 2, max: 2s, jitter: 0.1 }
      circuitBreaker:
        failureThreshold: 5
        successThreshold: 3
        timeout: 30s
        halfOpenRequests: 3
      bulkhead:
        maxConcurrent: 30
        maxWait: 5s
      fallback:
        type: handler
        handler: handleProductFallback

    PaymentService:
      timeout: 30s
      retry:
        maxAttempts: 3
        backoff: { type: exponential, initial: 500ms, multiplier: 2, max: 5s, jitter: 0.1 }
        retryableErrors: [ConnectionError, TimeoutError, ServiceUnavailable]
        nonRetryableErrors: [ValidationError, AuthenticationError]
      circuitBreaker:
        failureThreshold: 3
        successThreshold: 3
        timeout: 60s
        halfOpenRequests: 5
      bulkhead:
        maxConcurrent: 50
        maxWait: 10s
      fallback:
        type: handler
        handler: handlePaymentFallback

    ShippingService:
      timeout: 10s
      circuitBreaker:
        failureThreshold: 5
        successThreshold: 3
        timeout: 30s
        halfOpenRequests: 3
      fallback:
        type: handler
        handler: handleShippingFallback

    UserService:
      timeout: 5s
      retry:
        maxAttempts: 2
        backoff: { type: exponential, initial: 50ms, multiplier: 2, max: 1s, jitter: 0.1 }
      circuitBreaker:
        failureThreshold: 5
        successThreshold: 2
        timeout: 15s
        halfOpenRequests: 3
      bulkhead:
        maxConcurrent: 20
        maxWait: 3s
      fallback:
        type: handler
        handler: handleUserFallback

