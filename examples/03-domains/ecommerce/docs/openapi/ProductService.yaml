components:
  schemas:
    Category:
      type: object
      properties:
        id:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        name:
          type: string
          maxLength: 100
        description:
          $ref: '#/components/schemas/Text?'
        slug:
          $ref: '#/components/schemas/Slug'
      required:
      - id
      - createdAt
      - updatedAt
      - name
      - slug
    Product:
      type: object
      properties:
        id:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        slug:
          type: string
          maxLength: 200
        price:
          $ref: '#/components/schemas/Money'
        compareAtPrice:
          $ref: '#/components/schemas/Money?'
        inventory:
          $ref: '#/components/schemas/Integer'
        name:
          type: string
          maxLength: 200
        description:
          type: string
        status:
          $ref: '#/components/schemas/ProductStatus'
        productMetadata:
          $ref: '#/components/schemas/JSON?'
        images:
          type: object
        tags:
          type: object
      required:
      - id
      - createdAt
      - updatedAt
      - slug
      - price
      - inventory
      - name
      - description
      - status
      - images
      - tags
    InventoryReservation:
      type: object
      properties:
        id:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        reservationId:
          type: string
          format: uuid
        quantity:
          $ref: '#/components/schemas/Integer'
        status:
          $ref: '#/components/schemas/ReservationStatus'
        expiresAt:
          type: string
          format: date-time
      required:
      - id
      - createdAt
      - updatedAt
      - reservationId
      - quantity
      - status
      - expiresAt
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
