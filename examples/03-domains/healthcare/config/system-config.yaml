test:
  language: python
  hosting: docker
  defaultTimeout: 30000
  maxPageSize: 50
  defaultLocale: en-US
  timezone: UTC
  env:
    DEBUG: false
    CORS_ORIGINS: '["*"]'
    SECRETS_BACKEND: environment
    JWT_SECRET: dev-secret-change-in-production
    JWT_ALGORITHM: HS256
    JWT_EXPIRY: 3600
  hipaa:
    auditAllAccess: true
    encryptPHI: true
    sessionTimeout: 900
    passwordPolicy:
      minLength: 12
      requireUppercase: true
      requireLowercase: true
      requireNumbers: true
      requireSpecial: true
      maxAge: 90
  secrets:
    provider: env
  encryption:
    atRest: true
    inTransit: true
    algorithm: AES-256-GCM
development:
  language: python
  hosting: docker
  defaultTimeout: 30000
  maxPageSize: 50
  defaultLocale: en-US
  timezone: UTC
  env:
    DEBUG: false
    CORS_ORIGINS: '["*"]'
    SECRETS_BACKEND: environment
    JWT_SECRET: dev-secret-change-in-production
    JWT_ALGORITHM: HS256
    JWT_EXPIRY: 3600
  hipaa:
    auditAllAccess: true
    encryptPHI: true
    sessionTimeout: 900
    passwordPolicy:
      minLength: 12
      requireUppercase: true
      requireLowercase: true
      requireNumbers: true
      requireSpecial: true
      maxAge: 90
  secrets:
    provider: env
  encryption:
    atRest: true
    inTransit: true
    algorithm: AES-256-GCM
production:
  language: python
  hosting: aws
  defaultTimeout: 30000
  maxPageSize: 50
  defaultLocale: en-US
  timezone: UTC
  hipaa:
    auditAllAccess: true
    encryptPHI: true
    sessionTimeout: 900
    passwordPolicy:
      minLength: 12
      requireUppercase: true
      requireLowercase: true
      requireNumbers: true
      requireSpecial: true
      maxAge: 90
  region: us-east-1
  secrets:
    provider: vault
    path: secret/healthcare
    encryption: aes-256-gcm
  encryption:
    atRest: true
    inTransit: true
    algorithm: AES-256-GCM
