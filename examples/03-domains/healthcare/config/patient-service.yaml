base:
  platform: compose
  port: 8050
  tracing:
    level: full
  replicas: 3
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 704Mi
  healthCheck:
    type: http
    path: /health
    initialDelay: 10s
    period: 5s
    failureThreshold: 3
    successThreshold: 1
  readinessCheck:
    type: http
    path: /ready
    initialDelay: 5s
    period: 5s
  rdbms:
    patientDb:
      engine: postgres
      host: localhost
      database: healthcare_patients
      poolSize: 20
      ssl: false
      platform: container
  registration:
    tags:
    - api
    - patients
    - demographics
    - v1
    meta:
      team: patient-care
      compliance: hipaa
    healthCheck:
      type: http
      path: /health
      interval: 10s
  resilience:
    defaults:
      timeout: 10s
      retry:
        maxAttempts: 2
        backoff:
          type: exponential
          initial: 100ms
          multiplier: 2
          max: 2s
          jitter: 0.1
        retryableErrors:
        - ConnectionError
        - TimeoutError
        - ServiceUnavailable
        nonRetryableErrors:
        - ValidationError
        - AuthenticationError
  cache:
    redis:
      engine: redis
      host: localhost
      platform: container
  pubsub:
    mq:
      engine: kafka
      partitions: 3
      replicationFactor: 1
      brokers:
      - localhost:9092
      topics:
        PatientEvents:
          partitions: 3
          retention: 30d
      platform: container
production:
  platform: ecs-fargate
  strategy:
    rolling:
      maxUnavailable: 25%
      maxSurge: 25%
      timeout: 10m
  resources:
    limits:
      memory: 512Mi
  rollback:
    automatic: true
    revisionHistory: 5
  scaling:
    replicas:
      min: 2
      max: 8
    triggers:
    - metric: cpu
      target: 70%
  rdbms:
    patientDb:
      engine: postgres
      host: ${PATIENT_DB_HOST}
      database: healthcare_patients
      poolSize: 40
      ssl: true
      platform: rds
      _replace: true
  cache:
    redis:
      engine: redis
      url: ${PATIENT_REDIS_URL}
      platform: elasticache
      _replace: true
  pubsub:
    mq:
      engine: kafka
      partitions: 3
      replicationFactor: 1
      brokers:
      - ${KAFKA_BROKER_1}
      - ${KAFKA_BROKER_2}
      - ${KAFKA_BROKER_3}
      topics:
        PatientEvents:
          partitions: 12
          retention: 90d
      platform: managed
      _replace: true
