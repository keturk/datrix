test:
  platform: compose
  port: 8052
  tracing:
    level: full
  replicas: 3
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  healthCheck:
    type: http
    path: /health
    initialDelay: 10s
    period: 5s
    failureThreshold: 3
    successThreshold: 1
  readinessCheck:
    type: http
    path: /ready
    initialDelay: 5s
    period: 5s
development:
  platform: compose
  port: 8052
  tracing:
    level: full
  replicas: 3
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  healthCheck:
    type: http
    path: /health
    initialDelay: 10s
    period: 5s
    failureThreshold: 3
    successThreshold: 1
  readinessCheck:
    type: http
    path: /ready
    initialDelay: 5s
    period: 5s
production:
  platform: ecs-fargate
  port: 8052
  tracing:
    level: full
  strategy:
    rolling:
      maxUnavailable: 25%
      maxSurge: 25%
      timeout: 10m
  replicas: 3
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  healthCheck:
    type: http
    path: /health
    initialDelay: 10s
    period: 5s
    failureThreshold: 3
    successThreshold: 1
  readinessCheck:
    type: http
    path: /ready
    initialDelay: 5s
    period: 5s
  rollback:
    automatic: true
    revisionHistory: 5
  scaling:
    replicas:
      min: 2
      max: 8
    triggers:
    - metric: cpu
      target: 70%
