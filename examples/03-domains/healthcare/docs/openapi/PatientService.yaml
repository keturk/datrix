openapi: 3.1.0
info:
  title: healthcare.PatientService API
  version: 1.0.0
paths:
  /api/v1/patients:
    get:
      operationId: get
      summary: get
      security:
      - bearerAuth: []
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
    post:
      operationId: post
      summary: post
      security:
      - bearerAuth: []
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
  /api/v1/patients/:id:
    get:
      operationId: get
      summary: get
      security:
      - bearerAuth: []
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
    put:
      operationId: put
      summary: put
      security:
      - bearerAuth: []
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
  /api/v1/patients/mrn/:mrn:
    get:
      operationId: get
      summary: get
      security:
      - bearerAuth: []
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
  /api/v1/patients/:id/status:
    put:
      operationId: put
      summary: put
      security:
      - bearerAuth: []
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
  /api/v1/patients/internal/:id:
    get:
      operationId: get
      summary: get
      security:
      - bearerAuth: []
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
  /api/v1/patients/internal/mrn/:mrn:
    get:
      operationId: get
      summary: get
      security:
      - bearerAuth: []
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
  /api/v1/patients/internal/validate:
    post:
      operationId: post
      summary: post
      security:
      - bearerAuth: []
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
  /api/v1/patients/internal/bulk:
    post:
      operationId: post
      summary: post
      security:
      - bearerAuth: []
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
components:
  schemas:
    Patient:
      type: object
      properties:
        id:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        deletedAt:
          $ref: '#/components/schemas/DateTime?'
        deletedBy:
          $ref: '#/components/schemas/UUID?'
        mrn:
          type: string
          maxLength: 20
        firstName:
          type: string
          maxLength: 100
        lastName:
          type: string
          maxLength: 100
        middleName:
          $ref: '#/components/schemas/String(100)?'
        dateOfBirth:
          type: string
          format: date
        gender:
          $ref: '#/components/schemas/Gender'
        bloodType:
          $ref: '#/components/schemas/BloodType?'
        status:
          $ref: '#/components/schemas/PatientStatus'
        email:
          $ref: '#/components/schemas/Email?'
        phone:
          $ref: '#/components/schemas/Phone?'
        address:
          $ref: '#/components/schemas/Address?'
        emergencyContact:
          $ref: '#/components/schemas/EmergencyContact?'
        primaryInsurance:
          $ref: '#/components/schemas/InsuranceInfo?'
        secondaryInsurance:
          $ref: '#/components/schemas/InsuranceInfo?'
        ssn:
          $ref: '#/components/schemas/String(11)?'
        driversLicense:
          $ref: '#/components/schemas/String(50)?'
      required:
      - id
      - createdAt
      - updatedAt
      - mrn
      - firstName
      - lastName
      - dateOfBirth
      - gender
      - status
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
