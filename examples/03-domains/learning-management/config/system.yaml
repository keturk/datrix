base:
  language: python
  hosting: docker
  defaultTimeout: 30000
  maxPageSize: 100
  defaultLocale: en-US
  timezone: UTC
  env:
    DEBUG: false
    CORS_ORIGINS: '["*"]'
    SECRETS_BACKEND: environment
  secrets:
    provider: env
  gateway:
    port: 80
    rateLimit:
      default:
        requests: 100
        window: 1m
        key: ip
      StudentAPI.public:
        requests: 10
        window: 1m
        key: ip
      CourseAPI:
        requests: 50
        window: 1m
        key: user
      EnrollmentAPI:
        requests: 20
        window: 1m
        key: user
    auth:
      jwt:
        algorithm: HS256
        issuer: ecommerce-platform
        expiresIn: 86400
        exclude:
        - /health
        - publicRoutes
    cors:
      origins:
      - http://localhost:3000
      - https://shop.example.com
      - https://admin.example.com
      methods:
      - GET
      - POST
      - PUT
      - DELETE
      - PATCH
      headers:
      - Content-Type
      - Authorization
      - X-Idempotency-Key
      allowCredentials: true
      maxAge: 86400
    transform:
      request:
        addHeader:
          X-Gateway-Version: '1.0'
      response:
        removeHeader:
        - X-Powered-By
  observability:
    metrics:
      provider: prometheus
      endpoint: /metrics
      includeDefault: true
      labels:
        environment: development
        region: us-east-1
    tracing:
      provider: jaeger
      samplingRate: 0.1
      propagation: w3c
    logging:
      level: info
      format: json
      includeTrace: true
      provider: loki
    visualization:
      provider: grafana
    alerting:
      provider: alertmanager
  serviceDiscovery:
    type: consul
    host: localhost
    port: 8500
    datacenter: dc1
production:
  hosting: aws
  region: us-east-1
  secrets:
    provider: vault
    path: secret/ecommerce
  gateway:
    cors:
      origins:
      - https://shop.example.com
      - https://admin.example.com
  observability:
    metrics:
      labels:
        environment: production
    tracing:
      endpoint: ${JAEGER_URL}
  serviceDiscovery:
    type: kubernetes
    namespace: default
    labelSelector: app=ecommerce
