base:
  platform: compose
  port: 8002
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  healthCheck:
    path: /health
    initialDelay: 10s
  rdbms:
    contractDb:
      engine: postgres
      host: localhost
      database: realestate_contracts
      poolSize: 20
      platform: container
  registration:
    tags:
    - api
    - library
    - v1
    meta: {}
    healthCheck:
      type: http
      path: /health
      interval: 10s
  resilience:
    defaults:
      timeout: 10s
      retry:
        maxAttempts: 2
        backoff:
          type: exponential
          initial: 100ms
          multiplier: 2
  pubsub:
    mq:
      engine: kafka
      partitions: 3
      replicationFactor: 1
      brokers:
      - localhost:9092
      topics:
        ContractEvents:
          partitions: 6
          retention: 30d
      platform: container
  storage:
    store:
      provider: minio
      endpoint: http://localhost:9000
      bucket: realestate-contracts
      accessKey: ${MINIO_ACCESS_KEY}
      secretKey: ${MINIO_SECRET_KEY}
      region: us-east-1
      platform: minio
production:
  platform: ecs-fargate
  strategy:
    rolling:
      maxUnavailable: 25%
  replicas: 2
  rdbms:
    contractDb:
      engine: postgres
      host: ${DB_HOST}
      database: realestate_contracts
      poolSize: 40
      ssl: true
      platform: rds
      _replace: true
  pubsub:
    mq:
      engine: kafka
      partitions: 3
      replicationFactor: 1
      brokers:
      - ${KAFKA_BROKER_1}
      - ${KAFKA_BROKER_2}
      - ${KAFKA_BROKER_3}
      topics:
        ContractEvents:
          partitions: 24
          retention: 365d
      platform: managed
      _replace: true
  storage:
    store:
      provider: s3
      bucket: realestate-contracts-prod
      region: ${AWS_REGION}
      credentials: iam
      platform: s3
      _replace: true
