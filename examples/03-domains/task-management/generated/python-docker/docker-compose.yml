services:
  taskmgmt-user-service:
    build:
      context: ./taskmgmt_user_service
      dockerfile: Dockerfile
    image: taskmgmt-user-service:latest
    container_name: taskmgmt-user-service
    ports:
      - "8010:8010"
    environment:
      PORT: "8010"
      SERVICE_NAME: "taskmgmt-user-service"
      DB_DATABASE_URL: "${DB_DATABASE_URL_TASKMGMT_USER_SERVICE}"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://taskmgmt-system-jaeger:4317"
      DEBUG: "true"
      JWT_SECRET: "dev-secret-change-in-production"
      JWT_ALGORITHM: "HS256"
      JWT_EXPIRY: "3600"
    env_file:
      - .env
    depends_on:
      taskmgmt-system-postgresql:
        condition: service_healthy
      taskmgmt-user-service-db-migrate:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          cpus: 0.5
          memory: 512M
    healthcheck:
      test:
        - "CMD-SHELL"
        - "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8010/health')\""
      interval: 5s
      start_period: 10s
      retries: 3
    networks:
      - taskmgmt-system-network
    restart: unless-stopped

  taskmgmt-project-service:
    build:
      context: ./taskmgmt_project_service
      dockerfile: Dockerfile
    image: taskmgmt-project-service:latest
    container_name: taskmgmt-project-service
    ports:
      - "8011:8011"
    environment:
      PORT: "8011"
      SERVICE_NAME: "taskmgmt-project-service"
      DB_DATABASE_URL: "${DB_DATABASE_URL_TASKMGMT_PROJECT_SERVICE}"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://taskmgmt-system-jaeger:4317"
      TASKMGMT_USER_SERVICE_SERVICE_URL: "http://taskmgmt-user-service:8010"
      DEBUG: "true"
      JWT_SECRET: "dev-secret-change-in-production"
      JWT_ALGORITHM: "HS256"
      JWT_EXPIRY: "3600"
    env_file:
      - .env
    depends_on:
      taskmgmt-system-postgresql:
        condition: service_healthy
      taskmgmt-project-service-db-migrate:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          cpus: 0.5
          memory: 512M
    healthcheck:
      test:
        - "CMD-SHELL"
        - "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8011/health')\""
      interval: 5s
      start_period: 10s
      retries: 3
    networks:
      - taskmgmt-system-network
    restart: unless-stopped

  taskmgmt-task-service:
    build:
      context: ./taskmgmt_task_service
      dockerfile: Dockerfile
    image: taskmgmt-task-service:latest
    container_name: taskmgmt-task-service
    ports:
      - "8012:8012"
    environment:
      PORT: "8012"
      SERVICE_NAME: "taskmgmt-task-service"
      DB_DATABASE_URL: "${DB_DATABASE_URL_TASKMGMT_TASK_SERVICE}"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://taskmgmt-system-jaeger:4317"
      TASKMGMT_PROJECT_SERVICE_SERVICE_URL: "http://taskmgmt-project-service:8011"
      TASKMGMT_USER_SERVICE_SERVICE_URL: "http://taskmgmt-user-service:8010"
      DEBUG: "true"
      JWT_SECRET: "dev-secret-change-in-production"
      JWT_ALGORITHM: "HS256"
      JWT_EXPIRY: "3600"
    env_file:
      - .env
    depends_on:
      taskmgmt-system-postgresql:
        condition: service_healthy
      taskmgmt-task-service-db-migrate:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          cpus: 0.5
          memory: 512M
    healthcheck:
      test:
        - "CMD-SHELL"
        - "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8012/health')\""
      interval: 5s
      start_period: 10s
      retries: 3
    networks:
      - taskmgmt-system-network
    restart: unless-stopped

  taskmgmt-system-postgresql:
    image: postgres:17-alpine
    container_name: taskmgmt-system-postgresql
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: "task_users"
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD_TASKMGMT_SYSTEM_POSTGRESQL}"
    env_file:
      - .env
    volumes:
      - taskmgmt-system-postgresql-data:/var/lib/postgresql/data
      - ./scripts/init-db/taskmgmt-system-postgresql.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - taskmgmt-system-network
    restart: "unless-stopped"

  taskmgmt-user-service-db-migrate:
    image: taskmgmt-user-service:latest
    container_name: taskmgmt-user-service-db-migrate
    environment:
      DB_DATABASE_URL: "${DB_DATABASE_URL_TASKMGMT_USER_SERVICE}"
    env_file:
      - .env
    command:
      - "alembic"
      - "-c"
      - "alembic-db.ini"
      - "upgrade"
      - "head"
    depends_on:
      taskmgmt-system-postgresql:
        condition: service_healthy
    networks:
      - taskmgmt-system-network
    restart: "no"

  taskmgmt-project-service-db-migrate:
    image: taskmgmt-project-service:latest
    container_name: taskmgmt-project-service-db-migrate
    environment:
      DB_DATABASE_URL: "${DB_DATABASE_URL_TASKMGMT_PROJECT_SERVICE}"
    env_file:
      - .env
    command:
      - "alembic"
      - "-c"
      - "alembic-db.ini"
      - "upgrade"
      - "head"
    depends_on:
      taskmgmt-system-postgresql:
        condition: service_healthy
    networks:
      - taskmgmt-system-network
    restart: "no"

  taskmgmt-task-service-db-migrate:
    image: taskmgmt-task-service:latest
    container_name: taskmgmt-task-service-db-migrate
    environment:
      DB_DATABASE_URL: "${DB_DATABASE_URL_TASKMGMT_TASK_SERVICE}"
    env_file:
      - .env
    command:
      - "alembic"
      - "-c"
      - "alembic-db.ini"
      - "upgrade"
      - "head"
    depends_on:
      taskmgmt-system-postgresql:
        condition: service_healthy
    networks:
      - taskmgmt-system-network
    restart: "no"

  taskmgmt-system-prometheus:
    image: prom/prometheus:v2.49.1
    container_name: taskmgmt-system-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./config/prometheus:/etc/prometheus/rules:ro
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - taskmgmt-system-network
    restart: "unless-stopped"

  taskmgmt-system-jaeger:
    image: jaegertracing/all-in-one:1.53
    container_name: taskmgmt-system-jaeger
    ports:
      - "16686:16686"
      - "14268:14268"
      - "4317:4317"
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:14269/"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - taskmgmt-system-network
    restart: "unless-stopped"

  taskmgmt-system-loki:
    image: grafana/loki:2.9.10
    container_name: taskmgmt-system-loki
    ports:
      - "3100:3100"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3100/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - taskmgmt-system-network
    restart: "unless-stopped"

  taskmgmt-system-alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: taskmgmt-system-alertmanager
    ports:
      - "9093:9093"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:9093/-/healthy || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - taskmgmt-system-network
    restart: "unless-stopped"

  taskmgmt-system-grafana:
    image: grafana/grafana:10.2.3
    container_name: taskmgmt-system-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: "${GRAFANA_ADMIN_USER:-admin}"
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD:-changeme}"
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./config/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      taskmgmt-system-prometheus:
        condition: service_healthy
      taskmgmt-system-jaeger:
        condition: service_healthy
      taskmgmt-system-loki:
        condition: service_healthy
      taskmgmt-system-alertmanager:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - taskmgmt-system-network
    restart: "unless-stopped"

  taskmgmt-system-api-gateway:
    image: nginx:1.25-alpine
    container_name: taskmgmt-system-api-gateway
    ports:
      - "80:80"
    volumes:
      - ./config/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      taskmgmt-user-service:
        condition: service_healthy
      taskmgmt-project-service:
        condition: service_healthy
      taskmgmt-task-service:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'nginx', '-t']
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - taskmgmt-system-network
    restart: "unless-stopped"

volumes:
  taskmgmt-system-postgresql-data:
    driver: local
  grafana-data:
    driver: local

networks:
  taskmgmt-system-network:
    driver: bridge
