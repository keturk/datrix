openapi: 3.1.0
info:
  title: taskmgmt.ProjectService API
  version: 1.0.0
paths:
  /api/v1/projects/projects:
    get:
      operationId: list_projects
      summary: list_projects
      security:
      - bearerAuth: []
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
    post:
      operationId: create_project
      summary: create_project
      security:
      - bearerAuth: []
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
  /api/v1/projects/projects/:id:
    get:
      operationId: get_project
      summary: get_project
      security:
      - bearerAuth: []
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
    put:
      operationId: update_project
      summary: update_project
      security:
      - bearerAuth: []
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
    delete:
      operationId: delete_project
      summary: delete_project
      security:
      - bearerAuth: []
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
components:
  schemas:
    Project:
      type: object
      properties:
        id:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        name:
          type: string
          maxLength: 200
        ownerId:
          type: string
          format: uuid
      required:
      - id
      - createdAt
      - updatedAt
      - name
      - ownerId
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
