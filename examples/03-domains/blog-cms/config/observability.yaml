test:
  metrics:
    provider: prometheus
    endpoint: /metrics
    includeDefault: true
    labels:
      environment: development
      region: us-east-1
    server: http://10.94.143.92:9090
  tracing:
    provider: jaeger
    samplingRate: 0.1
    propagation: w3c
    endpoint: http://10.94.143.92:4317
  logging:
    level: info
    format: json
    includeTrace: true
    provider: loki
    endpoint: http://10.94.143.92:3100
  visualization:
    provider: grafana
    endpoint: http://10.94.143.92:3000
  alerting:
    provider: alertmanager
    endpoint: http://10.94.143.92:9093
development:
  metrics:
    provider: prometheus
    endpoint: /metrics
    includeDefault: true
    labels:
      environment: development
      region: us-east-1
  tracing:
    provider: jaeger
    samplingRate: 0.1
    propagation: w3c
  logging:
    level: info
    format: json
    includeTrace: true
    provider: loki
  visualization:
    provider: grafana
production:
  metrics:
    provider: prometheus
    endpoint: /metrics
    includeDefault: true
    labels:
      environment: production
      region: us-east-1
  tracing:
    provider: jaeger
    endpoint: ${JAEGER_URL}
    samplingRate: 0.1
    propagation: w3c
  logging:
    level: info
    format: json
    includeTrace: true
