base:
  platform: compose
  port: 8000
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  healthCheck:
    path: /health
    initialDelay: 10s
  rdbms:
    deviceDb:
      engine: postgres
      host: localhost
      database: iot_devices
      poolSize: 20
      platform: container
      port: 5432
      dockerImage: postgres:17-alpine
      volumePath: /var/lib/postgresql/data
      asyncDriver: postgresql+asyncpg
      syncDriver: postgresql+psycopg2
      healthCheckSql: SELECT 1
      defaultUser: postgres
  registration:
    tags:
    - api
    - library
    - v1
    meta: {}
    healthCheck:
      type: http
      path: /health
      interval: 10s
  resilience:
    defaults:
      timeout: 10s
      retry:
        maxAttempts: 2
        backoff:
          type: exponential
          initial: 100ms
          multiplier: 2
  cache:
    redis:
      engine: redis
      host: localhost
      platform: container
      port: 6379
      dockerImage: redis:7-alpine
      volumePath: /data
      healthCheckCmd: redis-cli ping
  pubsub:
    mq:
      engine: kafka
      partitions: 3
      replicationFactor: 1
      brokers:
      - localhost:9092
      topics:
        DeviceEvents:
          partitions: 6
          retention: 14d
      platform: container
      port: 9092
      dockerImage: confluentinc/cp-kafka:7.8.0
      volumePath: /var/lib/kafka/data
      controllerPort: 9093
production:
  platform: ecs-fargate
  strategy:
    rolling:
      maxUnavailable: 25%
  replicas: 2
  rdbms:
    deviceDb:
      engine: postgres
      host: ${DB_HOST}
      database: iot_devices
      poolSize: 40
      ssl: true
      platform: rds
      _replace: true
  cache:
    redis:
      engine: redis
      url: ${DEVICE_REDIS_URL}
      platform: elasticache
      _replace: true
  pubsub:
    mq:
      engine: kafka
      partitions: 3
      replicationFactor: 1
      brokers:
      - ${KAFKA_BROKER_1}
      - ${KAFKA_BROKER_2}
      - ${KAFKA_BROKER_3}
      topics:
        DeviceEvents:
          partitions: 24
          retention: 90d
      platform: managed
      _replace: true
