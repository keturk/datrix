base:
  platform: compose
  port: 8002
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  healthCheck:
    path: /health
    initialDelay: 10s
  rdbms:
    complianceDb:
      engine: postgres
      host: localhost
      database: finance_compliance
      poolSize: 20
      platform: container
  registration:
    tags:
    - api
    - library
    - v1
    meta: {}
    healthCheck:
      type: http
      path: /health
      interval: 10s
  resilience:
    defaults:
      timeout: 10s
      retry:
        maxAttempts: 2
        backoff:
          type: exponential
          initial: 100ms
          multiplier: 2
  pubsub:
    mq:
      engine: kafka
      partitions: 3
      replicationFactor: 1
      brokers:
      - localhost:9092
      topics:
        ComplianceEvents:
          partitions: 3
          retention: 30d
      platform: container
  jobs:
    jobs:
      CheckLargeTransactions:
        schedule: 0 * * * *
        retry:
          maxAttempts: 1
          backoff: fixed
        timeout: 30s
      GenerateComplianceReport:
        schedule: 0 3 * * *
        retry:
          maxAttempts: 1
          backoff: fixed
        timeout: 60s
production:
  platform: ecs-fargate
  strategy:
    rolling:
      maxUnavailable: 25%
  replicas: 2
  rdbms:
    complianceDb:
      engine: postgres
      host: ${DB_HOST}
      database: finance_compliance
      poolSize: 40
      ssl: true
      platform: rds
      _replace: true
  pubsub:
    mq:
      engine: kafka
      partitions: 3
      replicationFactor: 1
      brokers:
      - ${KAFKA_BROKER_1}
      - ${KAFKA_BROKER_2}
      - ${KAFKA_BROKER_3}
      topics:
        ComplianceEvents:
          partitions: 12
          retention: 365d
      platform: managed
      _replace: true
  jobs:
    jobs:
      CheckLargeTransactions:
        schedule: '*/15 * * * *'
        retry:
          maxAttempts: 3
          backoff: exponential
        timeout: 5m
      GenerateComplianceReport:
        retry:
          maxAttempts: 3
          backoff: exponential
        timeout: 15m
