test:
  port: 80
  rateLimit:
    default: { requests: 100, window: 1m, key: ip }
  auth:
    jwt:
      algorithm: HS256
      issuer: finance
      expiresIn: 86400
      exclude: [/health, "publicRoutes"]
  cors:
    origins: [http://localhost:3000]
    methods: [GET, POST, PUT, DELETE, PATCH]
    headers: [Content-Type, Authorization]

