base:
  platform: compose
  port: 8000
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  healthCheck:
    path: /health
    initialDelay: 10s
  rdbms:
    fleetDb:
      engine: postgres
      host: localhost
      database: logistics_fleet
      poolSize: 20
      platform: container
  registration:
    tags:
    - api
    - library
    - v1
    meta: {}
    healthCheck:
      type: http
      path: /health
      interval: 10s
  resilience:
    defaults:
      timeout: 10s
      retry:
        maxAttempts: 2
        backoff:
          type: exponential
          initial: 100ms
          multiplier: 2
  cache:
    redis:
      engine: redis
      host: localhost
      platform: container
  pubsub:
    mq:
      engine: kafka
      partitions: 3
      replicationFactor: 1
      brokers:
      - localhost:9092
      topics:
        FleetEvents:
          partitions: 3
          retention: 14d
      platform: container
  jobs:
    jobs:
      CheckMaintenanceSchedule:
        schedule: 0 6 * * *
        retry:
          maxAttempts: 1
          backoff: fixed
        timeout: 60s
      UpdateFleetMetrics:
        schedule: '*/15 * * * *'
        retry:
          maxAttempts: 1
          backoff: fixed
        timeout: 30s
production:
  platform: ecs-fargate
  strategy:
    rolling:
      maxUnavailable: 25%
  replicas: 2
  rdbms:
    fleetDb:
      engine: postgres
      host: ${DB_HOST}
      database: logistics_fleet
      poolSize: 40
      ssl: true
      platform: rds
      _replace: true
  cache:
    redis:
      engine: redis
      url: ${FLEET_REDIS_URL}
      platform: elasticache
      _replace: true
  pubsub:
    mq:
      engine: kafka
      partitions: 3
      replicationFactor: 1
      brokers:
      - ${KAFKA_BROKER_1}
      - ${KAFKA_BROKER_2}
      - ${KAFKA_BROKER_3}
      topics:
        FleetEvents:
          partitions: 12
          retention: 90d
      platform: managed
      _replace: true
  jobs:
    jobs:
      CheckMaintenanceSchedule:
        retry:
          maxAttempts: 3
          backoff: exponential
        timeout: 5m
      UpdateFleetMetrics:
        schedule: '*/5 * * * *'
        retry:
          maxAttempts: 3
          backoff: exponential
        timeout: 2m
