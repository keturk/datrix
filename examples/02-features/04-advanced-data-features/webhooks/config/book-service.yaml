base:
  platform: compose
  port: 8000
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 2Gi
  healthCheck:
    path: /health
    initialDelay: 30s
  rdbms:
    catalog:
      engine: postgres
      host: localhost
      database: library_catalog
      poolSize: 20
      platform: container
    reporting:
      engine: postgres
      host: localhost
      database: library_reporting
      poolSize: 10
      platform: container
  nosql:
    docdb:
      engine: mongodb
      uri: mongodb://localhost:27017
      database: library_documents
      platform: container
  registration:
    tags:
    - api
    - library
    - v1
    meta: {}
    healthCheck:
      type: http
      path: /health
      interval: 10s
  resilience:
    defaults:
      timeout: 10s
      retry:
        maxAttempts: 2
        backoff:
          type: exponential
          initial: 100ms
          multiplier: 2
  integrations:
    email:
      provider: sendgrid
      fromEmail: noreply@library.example.com
      fromName: Library Book Service
      templates:
        bookAvailable: d-book-available
        overdueNotice: d-overdue-notice
  cache:
    redis:
      engine: redis
      host: localhost
      platform: container
  pubsub:
    mq:
      engine: kafka
      partitions: 3
      replicationFactor: 1
      brokers:
      - localhost:9092
      topics:
        BookEvents:
          partitions: 3
          retention: 7d
      platform: container
  storage:
    store:
      provider: minio
      endpoint: http://localhost:9000
      bucket: library-files
      accessKey: ${MINIO_ACCESS_KEY}
      secretKey: ${MINIO_SECRET_KEY}
      region: us-east-1
      platform: minio
  jobs:
    jobs:
      CheckOverdueBooks:
        schedule: 0 */2 * * *
        timeout: 300s
        retries: 1
        concurrency: 1
      RefreshBookCache:
        schedule: 0 * * * *
        timeout: 120s
        retries: 1
        concurrency: 1
      ProcessOverdueCheckouts:
        schedule: 0 */2 * * *
        timeout: 300s
        retries: 1
        concurrency: 1
      AggregateDailyStats:
        schedule: 0 0 * * *
        timeout: 600s
        retries: 2
        concurrency: 1
production:
  platform: ecs-fargate
  replicas: 2
  resources:
    requests:
      cpu: 250m
      memory: 768Mi
    limits:
      cpu: 1000m
      memory: 2.5Gi
  rdbms:
    catalog:
      engine: postgres
      host: ${BOOK_CATALOG_DB_HOST}
      database: library_catalog
      poolSize: 40
      platform: rds
      ssl: true
      _replace: true
    reporting:
      engine: postgres
      host: ${BOOK_REPORTING_DB_HOST}
      database: library_reporting
      poolSize: 20
      platform: rds
      ssl: true
      _replace: true
  nosql:
    docdb:
      engine: mongodb
      uri: ${BOOK_NOSQL_URI}
      database: library_documents
      platform: managed
      _replace: true
  integrations:
    email:
      fromEmail: ${BOOK_SERVICE_FROM_EMAIL}
      templates:
        bookAvailable: ${BOOK_AVAILABLE_TEMPLATE_ID}
        overdueNotice: ${OVERDUE_NOTICE_TEMPLATE_ID}
  cache:
    redis:
      engine: redis
      url: ${BOOK_SERVICE_REDIS_URL}
      platform: elasticache
      _replace: true
  pubsub:
    mq:
      engine: kafka
      partitions: 3
      replicationFactor: 1
      brokers:
      - ${KAFKA_BROKER_1}
      - ${KAFKA_BROKER_2}
      - ${KAFKA_BROKER_3}
      topics:
        BookEvents:
          partitions: 12
          retention: 30d
      platform: managed
      _replace: true
  storage:
    store:
      provider: s3
      endpoint: http://localhost:9000
      bucket: library-files
      accessKey: ${MINIO_ACCESS_KEY}
      secretKey: ${MINIO_SECRET_KEY}
      region: ${AWS_REGION}
      platform: s3
      credentials: iam
      _replace: true
  jobs:
    jobs:
      CheckOverdueBooks:
        schedule: 0 */1 * * *
        timeout: 600s
        retries: 3
      RefreshBookCache:
        schedule: 0 */6 * * *
        timeout: 300s
        retries: 2
      ProcessOverdueCheckouts:
        schedule: 0 */1 * * *
        timeout: 600s
        retries: 3
        deadLetterQueue: overdue-checkouts-dlq
      AggregateDailyStats:
        timeout: 900s
        retries: 3
  strategy:
    rolling:
      maxUnavailable: 25%
