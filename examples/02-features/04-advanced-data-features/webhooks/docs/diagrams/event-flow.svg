<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 292">
<style>
  .header-text { font: bold 13px "Segoe UI", system-ui, -apple-system, sans-serif; fill: #ffffff; }
  .topic-text { font: bold 11px "Segoe UI", system-ui, -apple-system, sans-serif; fill: #0550ae; }
  .event-text { font: 11px "Segoe UI", system-ui, -apple-system, sans-serif; fill: #1f2328; }
  .handler-text { font: 11px "Segoe UI", system-ui, -apple-system, sans-serif; fill: #116329; }
  .incoming-text { font: 11px "Segoe UI", system-ui, -apple-system, sans-serif; fill: #7d4e00; }
  .section-label { font: bold 10px "Segoe UI", system-ui, -apple-system, sans-serif; fill: #656d76; text-transform: uppercase; letter-spacing: 0.5px; }
  .cross-label { font: italic 10px "Segoe UI", system-ui, -apple-system, sans-serif; fill: #a40e26; }
  .arrow-self { stroke: #656d76; fill: none; stroke-width: 1.5; marker-end: url(#arrow-self); }
  .arrow-cross { stroke: #cf222e; fill: none; stroke-width: 1.5; stroke-dasharray: 6,3; marker-end: url(#arrow-cross); }
</style>
<defs>
  <marker id="arrow-self" viewBox="0 0 10 10" refX="9" refY="5"
          markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#656d76"/>
  </marker>
  <marker id="arrow-cross" viewBox="0 0 10 10" refX="9" refY="5"
          markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#cf222e"/>
