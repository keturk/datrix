test:
  provider: minio
  platform: minio
  endpoint: http://localhost:9000
  bucket: hostdemo-blog-media
  accessKey: ${MINIO_ACCESS_KEY:minioadmin}
  secretKey: ${MINIO_SECRET_KEY:minioadmin}
  region: us-east-1

development:
  provider: minio
  platform: minio
  endpoint: http://localhost:9000
  bucket: hostdemo-blog-media
  accessKey: ${MINIO_ACCESS_KEY:minioadmin}
  secretKey: ${MINIO_SECRET_KEY:minioadmin}
  region: us-east-1

staging:
  provider: minio
  platform: minio-external
  endpoint: http://host.docker.internal:9000
  bucket: hostdemo-blog-media
  accessKey: ${MINIO_ACCESS_KEY:minioadmin}
  secretKey: ${MINIO_SECRET_KEY:minioadmin}
  region: us-east-1

production:
  provider: s3
  platform: s3
  bucket: hostdemo-blog-media
  region: ${AWS_REGION:us-east-1}
  credentials: iam
