base:
  platform: compose
  port: 8020
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  healthCheck:
    type: http
    path: /health
    initialDelay: 10s
    period: 5s
    failureThreshold: 3
    successThreshold: 1
  rdbms:
    blogDb:
      engine: postgres
      host: localhost
      database: hostdemo_blog
      poolSize: 10
      platform: container
  registration:
    name: blog-service
    host: localhost
    port: 8020
    tags:
    - blog
    - api
  resilience:
    circuitBreaker:
      enabled: true
      failureThreshold: 5
      successThreshold: 2
      timeout: 30000
    retry:
      enabled: true
      maxAttempts: 3
      backoff: exponential
      initialDelay: 1000
      maxDelay: 10000
  integrations:
    search:
      provider: elasticsearch
      platform: container
      host: localhost
      port: 9200
      indexPrefix: hostdemo_blog_
  cache:
    redis:
      engine: redis
      host: localhost
      platform: container
  pubsub:
    mq:
      engine: rabbitmq
      brokers:
      - localhost:5672
      partitions: 1
      replicationFactor: 1
      platform: container
  storage:
    media:
      provider: minio
      platform: minio
      endpoint: http://localhost:9000
      bucket: hostdemo-blog-media
      accessKey: ${MINIO_ACCESS_KEY:minioadmin}
      secretKey: ${MINIO_SECRET_KEY:minioadmin}
      region: us-east-1
production:
  platform: ecs-fargate
  replicas: 2
  rdbms:
    blogDb:
      engine: postgres
      platform: rds
      host: ${POSTGRES_HOST}
      database: hostdemo_blog
      poolSize: 20
      ssl: true
      _replace: true
  resilience:
    circuitBreaker:
      timeout: 60000
    retry:
      maxAttempts: 5
      initialDelay: 2000
      maxDelay: 30000
  integrations:
    search:
      platform: external
      host: ${ELASTICSEARCH_HOST}
      auth:
        username: ${ELASTICSEARCH_USER}
        password: ${ELASTICSEARCH_PASSWORD}
      ssl: true
  cache:
    redis:
      engine: redis
      platform: elasticache
      url: ${BLOG_REDIS_URL}
      _replace: true
  pubsub:
    mq:
      engine: rabbitmq
      platform: external
      brokers:
      - ${RABBITMQ_HOST}:5671
      partitions: 1
      replicationFactor: 1
      _replace: true
  storage:
    media:
      provider: s3
      platform: s3
      bucket: hostdemo-blog-media
      region: ${AWS_REGION:us-east-1}
      credentials: iam
      _replace: true
  strategy:
    rolling:
      maxUnavailable: 25%
      maxSurge: 25%
