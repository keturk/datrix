test:
  metrics:
    provider: prometheus
    endpoint: /metrics
    includeDefault: true
    server: ${PROMETHEUS_URL}
  tracing:
    provider: jaeger
    samplingRate: 0.1
    endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT}
  logging:
    level: info
    format: json
    provider: loki
    endpoint: ${LOKI_URL}
  visualization:
    provider: grafana
    endpoint: ${GRAFANA_URL}
  alerting:
    provider: alertmanager
    endpoint: ${ALERTMANAGER_URL}
development:
  metrics:
    provider: prometheus
    endpoint: /metrics
    includeDefault: true
  tracing:
    provider: jaeger
    samplingRate: 0.1
  logging:
    level: info
    format: json
    provider: loki
  visualization:
    provider: grafana
production:
  metrics:
    provider: prometheus
    endpoint: /metrics
    includeDefault: true
  tracing:
    provider: jaeger
    endpoint: ${JAEGER_URL}
    samplingRate: 0.1
  logging:
    level: info
    format: json
