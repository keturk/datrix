test:
  language: python
  deployment:
    runtime: docker-compose
    provider: local
  defaultTimeout: 30000
  maxPageSize: 100
  env:
    DEBUG: false
    CORS_ORIGINS: '["*"]'
    SECRETS_BACKEND: environment
  secrets:
    provider: env
development:
  language: python
  deployment:
    runtime: docker-compose
    provider: local
  defaultTimeout: 30000
  maxPageSize: 100
  env:
    DEBUG: false
    CORS_ORIGINS: '["*"]'
    SECRETS_BACKEND: environment
  secrets:
    provider: env
production:
  language: python
  deployment:
    runtime: ecs-fargate
    provider: aws
  defaultTimeout: 30000
  maxPageSize: 100
  region: us-east-1
  secrets:
    provider: vault
    path: secret/library
