base:
  platform: compose
  port: 8000
  tracing:
    level: minimal
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  healthCheck:
    path: /health
    initialDelay: 10s
  rdbms:
    bookDb:
      engine: postgres
      host: localhost
      database: library_books
      poolSize: 20
      platform: container
  registration:
    tags:
    - api
    - library
    - v1
    meta: {}
    healthCheck:
      type: http
      path: /health
      interval: 10s
  resilience:
    defaults:
      timeout: 10s
      retry:
        maxAttempts: 2
        backoff:
          type: exponential
          initial: 100ms
          multiplier: 2
production:
  platform: ecs-fargate
  replicas: 2
  rdbms:
    bookDb:
      engine: postgres
      host: ${DB_HOST}
      database: library_books
      poolSize: 40
      platform: rds
      ssl: true
      _replace: true
  strategy:
    rolling:
      maxUnavailable: 25%
