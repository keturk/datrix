openapi: 3.1.0
info:
  title: library.BookService API
  version: 1.0.0
paths:
  /api/v1/books:
    get:
      operationId: list_books
      summary: list_books
      security:
      - bearerAuth: []
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
    post:
      operationId: create_book
      summary: create_book
      security:
      - bearerAuth: []
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
  /api/v1/books/:id:
    get:
      operationId: get_book
      summary: get_book
      security:
      - bearerAuth: []
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
    put:
      operationId: update_book
      summary: update_book
      security:
      - bearerAuth: []
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
    delete:
      operationId: delete_book
      summary: delete_book
      security:
      - bearerAuth: []
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
components:
  schemas:
    Book:
      type: object
      properties:
        id:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        title:
          type: string
          maxLength: 200
        isbn:
          type: string
          maxLength: 20
        author:
          type: string
          maxLength: 100
        publicationYear:
          $ref: '#/components/schemas/Integer'
        status:
          $ref: '#/components/schemas/BookStatus'
        format:
          $ref: '#/components/schemas/BookFormat'
      required:
      - id
      - createdAt
      - updatedAt
      - title
      - isbn
      - author
      - publicationYear
      - status
      - format
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
