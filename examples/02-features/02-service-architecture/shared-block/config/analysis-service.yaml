base:
  platform: compose
  port: 8000
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 640Mi
  healthCheck:
    path: /health
    initialDelay: 10s
  rdbms:
    analysisDb:
      engine: postgres
      host: localhost
      database: library_books
      poolSize: 20
      platform: container
  registration:
    tags:
    - api
    - library
    - v1
    meta: {}
    healthCheck:
      type: http
      path: /health
      interval: 10s
  resilience:
    defaults:
      timeout: 10s
      retry:
        maxAttempts: 2
        backoff:
          type: exponential
          initial: 100ms
          multiplier: 2
  dependencies:
    services:
      DataIngestionService:
        url: http://data-ingestion-service:8080
        version: '1.0'
        healthCheck: /health
    shared:
      IngestionEvents: {}
production:
  platform: ecs-fargate
  replicas: 2
  resources:
    limits:
      memory: 512Mi
  rdbms:
    analysisDb:
      engine: postgres
      host: ${DB_HOST}
      database: library_books
      poolSize: 40
      platform: rds
      ssl: true
      _replace: true
  strategy:
    rolling:
      maxUnavailable: 25%
