base:
  pubsub:
    mq:
      engine: kafka
      partitions: 3
      replicationFactor: 1
      brokers:
      - localhost:9092
      topics:
        IngestionEvents:
          partitions: 3
          retention: 7d
      port: 9092
      docker_image: confluentinc/cp-kafka:7.8.0
      volume_path: /var/lib/kafka/data
      controllerPort: 9093
      platform: container
  storage:
    files:
      provider: minio
      endpoint: http://localhost:9000
      bucket: serverless-ingestion-demo
      accessKey: ${MINIO_ACCESS_KEY}
      secretKey: ${MINIO_SECRET_KEY}
      region: us-east-1
      platform: minio
  serverless:
    ingestionHandlers:
      platform: container
      defaults:
        timeout: 600
        memory: 1024
      handlers:
        SourceIngested:
          memory: 2048
        WeeklyDataPull:
          timeout: 900
production:
  pubsub:
    mq:
      engine: kafka
      partitions: 3
      replicationFactor: 1
      brokers:
      - ${KAFKA_BROKER_1}
      - ${KAFKA_BROKER_2}
      topics:
        IngestionEvents:
          partitions: 12
          retention: 30d
      port: 9092
      docker_image: confluentinc/cp-kafka:7.8.0
      volume_path: /var/lib/kafka/data
      controllerPort: 9093
      platform: managed
      _replace: true
  storage:
    files:
      provider: s3
      endpoint: http://localhost:9000
      bucket: serverless-ingestion-demo
      accessKey: ${MINIO_ACCESS_KEY}
      secretKey: ${MINIO_SECRET_KEY}
      region: ${AWS_REGION}
      platform: s3
      credentials: iam
      _replace: true
  serverless:
    ingestionHandlers:
      platform: lambda
