test:
  defaults:
    timeout: 10s
    retry:
      maxAttempts: 3
      backoff:
        type: exponential
        initial: 100ms
        multiplier: 2
        max: 5s
        jitter: 0.1
  config:
    MemberService:
      timeout: 5s
      circuitBreaker:
        failureThreshold: 5
        successThreshold: 3
        timeout: 30s
