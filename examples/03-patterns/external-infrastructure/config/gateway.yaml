test:
  port: 8080
  rateLimit:
    default: { requests: 200, window: 1m, key: ip }
    BlogAPI: { requests: 100, window: 1m, key: user }
    UserAPI: { requests: 50, window: 1m, key: user }
  auth:
    jwt:
      algorithm: HS256
      issuer: hostdemo
      expiresIn: 3600
      exclude: [/health]
  cors:
    origins: [http://localhost:3000]
    methods: [GET, POST, PUT, DELETE, PATCH, OPTIONS]
    headers: [Content-Type, Authorization]

