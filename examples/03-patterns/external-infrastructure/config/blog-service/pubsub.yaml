test:
  pubsub:
    engine: rabbitmq
    port: 5672
    brokers:
      - localhost:5672
    partitions: 1
    replicationFactor: 1
    docker_image: rabbitmq:4.0-management-alpine
    volume_path: /var/lib/rabbitmq
    managementPort: 15672
    platform: container

development:
  pubsub:
    engine: rabbitmq
    port: 5672
    brokers:
      - localhost:5672
    partitions: 1
    replicationFactor: 1
    docker_image: rabbitmq:4.0-management-alpine
    volume_path: /var/lib/rabbitmq
    managementPort: 15672
    platform: container

staging:
  pubsub:
    engine: rabbitmq
    port: 5672
    brokers:
      - localhost:5672
    partitions: 1
    replicationFactor: 1
    docker_image: rabbitmq:4.0-management-alpine
    volume_path: /var/lib/rabbitmq
    managementPort: 15672
    platform: container

production:
  pubsub:
    engine: rabbitmq
    platform: external
    brokers:
      - ${RABBITMQ_HOST}:5671
    partitions: 1
    replicationFactor: 1
