test:
  port: 443

  rateLimit:
    default: { requests: 50, window: 1m, key: user }
    PatientAPI: { requests: 30, window: 1m, key: user }
    AppointmentAPI: { requests: 30, window: 1m, key: user }
    MedicalRecordAPI: { requests: 10, window: 5m, key: user }

  auth:
    jwt:
      algorithm: RS256
      issuer: healthcare-platform
      audience: healthcare-api
      expiresIn: 3600
      exclude: [/health, "publicRoutes"]

  cors:
    origins: [http://localhost:3000, https://healthcare.example.com]
    methods: [GET, POST, PUT, DELETE]
    headers: [Content-Type, Authorization, X-Request-ID]
    allowCredentials: true
    maxAge: 3600

  transform:
    response:
      addHeader:
        Strict-Transport-Security: max-age=31536000; includeSubDomains
        X-Content-Type-Options: nosniff
        X-Frame-Options: DENY
        X-XSS-Protection: "1; mode=block"
        Content-Security-Policy: "default-src 'self'"
      removeHeader: [X-Powered-By, Server]

  circuitBreaker:
    failureThreshold: 5
    timeout: 60s
    halfOpenRequests: 3

