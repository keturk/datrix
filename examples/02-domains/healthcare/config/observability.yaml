test:
  metrics:
    provider: prometheus
    endpoint: /metrics
    includeDefault: true
    labels:
      environment: development
      region: us-east-1
      compliance: hipaa
  tracing:
    provider: jaeger
    samplingRate: 1.0
    propagation: w3c
  logging:
    level: info
    format: json
    includeTrace: true
    additionalFields:
      application: healthcare-platform
      compliance: hipaa
    provider: loki
  audit:
    enabled: true
    storage:
      type: elasticsearch
      endpoint: ${AUDIT_ES_URL}
      index: healthcare-audit
      retention: 7y
    events:
    - patient.view
    - patient.create
    - patient.update
    - record.view
    - record.create
    - record.update
    - record.delete
    - appointment.create
    - appointment.update
    - auth.login
    - auth.logout
    - auth.failed
  visualization:
    provider: grafana
  alerting:
    provider: alertmanager
