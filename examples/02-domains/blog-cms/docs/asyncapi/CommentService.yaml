asyncapi: 3.0.0
info:
  title: blog.CommentService Events
  version: 1.0.0
channels:
  CommentEvents:
    address: CommentEvents
    messages:
      CommentApproved:
        payload:
          type: object
          properties:
            commentId:
              type: string
              format: uuid
            contentId:
              type: string
              format: uuid
          required:
          - commentId
          - contentId
operations:
  publishCommentApproved:
    action: send
    channel:
      $ref: '#/channels/CommentEvents'
