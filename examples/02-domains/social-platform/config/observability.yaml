test:
  metrics:
    provider: prometheus
    endpoint: /metrics
    includeDefault: true
    labels:
      environment: development
      region: us-east-1
  tracing:
    provider: jaeger
    samplingRate: 0.1
    propagation: w3c
  logging:
    level: info
    format: json
    includeTrace: true
    provider: loki
  visualization:
    provider: grafana
  alerting:
    provider: alertmanager
development:
  metrics:
    provider: prometheus
    endpoint: /metrics
    includeDefault: true
    labels:
      environment: development
      region: us-east-1
  tracing:
    provider: jaeger
    samplingRate: 0.1
    propagation: w3c
  logging:
    level: info
    format: json
    includeTrace: true
    provider: loki
  visualization:
    provider: grafana
production:
  metrics:
    provider: prometheus
    endpoint: /metrics
    includeDefault: true
    labels:
      environment: production
      region: us-east-1
  tracing:
    provider: jaeger
    endpoint: ${JAEGER_URL}
    samplingRate: 0.1
    propagation: w3c
  logging:
    level: info
    format: json
    includeTrace: true
