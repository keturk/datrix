openapi: 3.1.0
info:
  title: taskmgmt.TaskService API
  version: 1.0.0
paths:
  /api/v1/tasks/tasks:
    get:
      operationId: list_tasks
      summary: list_tasks
      security:
      - bearerAuth: []
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
    post:
      operationId: create_task
      summary: create_task
      security:
      - bearerAuth: []
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
  /api/v1/tasks/tasks/:id:
    get:
      operationId: get_task
      summary: get_task
      security:
      - bearerAuth: []
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
    put:
      operationId: update_task
      summary: update_task
      security:
      - bearerAuth: []
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
    delete:
      operationId: delete_task
      summary: delete_task
      security:
      - bearerAuth: []
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
components:
  schemas:
    Task:
      type: object
      properties:
        id:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        projectId:
          type: string
          format: uuid
        assigneeId:
          type: string
          format: uuid
        title:
          type: string
          maxLength: 200
        completed:
          type: boolean
      required:
      - id
      - createdAt
      - updatedAt
      - projectId
      - assigneeId
      - title
      - completed
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
