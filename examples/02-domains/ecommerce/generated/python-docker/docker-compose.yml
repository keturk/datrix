services:
  ecommerce-user-service:
    build:
      context: ./ecommerce_user_service
      dockerfile: Dockerfile
    image: ecommerce-user-service:latest
    container_name: ecommerce-user-service
    ports:
      - "8000:8000"
    environment:
      PORT: "8000"
      SERVICE_NAME: "ecommerce-user-service"
      DB_DATABASE_URL: "${DB_DATABASE_URL_ECOMMERCE_USER_SERVICE}"
      REDIS_URL: "redis://ecommerce-redis:6379/0"
      KAFKA_BROKERS: "ecommerce-kafka:9092"
      INTERNAL_API_TOKEN: "${INTERNAL_API_TOKEN}"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://ecommerce-jaeger:4317"
      DEBUG: "true"
      JWT_SECRET: "dev-secret-change-in-production"
      JWT_ALGORITHM: "HS256"
      JWT_EXPIRY: "3600"
    env_file:
      - .env
    depends_on:
      ecommerce-postgresql:
        condition: service_healthy
      ecommerce-redis:
        condition: service_healthy
      ecommerce-kafka:
        condition: service_healthy
      ecommerce-user-service-mq-init:
        condition: service_completed_successfully
      ecommerce-user-service-db-migrate:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          cpus: 0.5
          memory: 512M
    healthcheck:
      test:
        - "CMD-SHELL"
        - "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""
      interval: 5s
      start_period: 10s
      retries: 3
    networks:
      - ecommerce-network
    restart: unless-stopped

  ecommerce-product-service:
    build:
      context: ./ecommerce_product_service
      dockerfile: Dockerfile
    image: ecommerce-product-service:latest
    container_name: ecommerce-product-service
    ports:
      - "8001:8001"
    environment:
      PORT: "8001"
      SERVICE_NAME: "ecommerce-product-service"
      DB_DATABASE_URL: "${DB_DATABASE_URL_ECOMMERCE_PRODUCT_SERVICE}"
      REDIS_URL: "redis://ecommerce-redis:6379/0"
      KAFKA_BROKERS: "ecommerce-kafka:9092"
      NOSQL_URI: "mongodb://ecommerce-product-service-docdb:27017"
      NOSQL_DATABASE: "ecommerce_product_reviews"
      INTERNAL_API_TOKEN: "${INTERNAL_API_TOKEN}"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://ecommerce-jaeger:4317"
      MINIO_ENDPOINT: "http://ecommerce-product-service-minio:9000"
      MINIO_ACCESS_KEY: "minio"
      MINIO_SECRET_KEY: "${MINIO_SECRET_KEY_ECOMMERCE_PRODUCT_SERVICE}"
      STORAGE_BUCKET: "ecommerce-products"
      DEBUG: "true"
      JWT_SECRET: "dev-secret-change-in-production"
      JWT_ALGORITHM: "HS256"
      JWT_EXPIRY: "3600"
    env_file:
      - .env
    depends_on:
      ecommerce-postgresql:
        condition: service_healthy
      ecommerce-redis:
        condition: service_healthy
      ecommerce-kafka:
        condition: service_healthy
      ecommerce-product-service-docdb:
        condition: service_healthy
      ecommerce-product-service-mq-init:
        condition: service_completed_successfully
      ecommerce-product-service-db-migrate:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          cpus: 0.5
          memory: 512M
    healthcheck:
      test:
        - "CMD-SHELL"
        - "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/health')\""
      interval: 5s
      start_period: 10s
      retries: 3
    networks:
      - ecommerce-network
    restart: unless-stopped

  ecommerce-order-service:
    build:
      context: ./ecommerce_order_service
      dockerfile: Dockerfile
    image: ecommerce-order-service:latest
    container_name: ecommerce-order-service
    ports:
      - "8002:8002"
    environment:
      PORT: "8002"
      SERVICE_NAME: "ecommerce-order-service"
      DB_DATABASE_URL: "${DB_DATABASE_URL_ECOMMERCE_ORDER_SERVICE}"
      REDIS_URL: "redis://ecommerce-redis:6379/0"
      KAFKA_BROKERS: "ecommerce-kafka:9092"
      INTERNAL_API_TOKEN: "${INTERNAL_API_TOKEN}"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://ecommerce-jaeger:4317"
      ECOMMERCE_PRODUCT_SERVICE_SERVICE_URL: "http://ecommerce-product-service:8001"
      ECOMMERCE_SHIPPING_SERVICE_SERVICE_URL: "http://ecommerce-shipping-service:8004"
      ECOMMERCE_PAYMENT_SERVICE_SERVICE_URL: "http://ecommerce-payment-service:8003"
      DEBUG: "true"
      JWT_SECRET: "dev-secret-change-in-production"
      JWT_ALGORITHM: "HS256"
      JWT_EXPIRY: "3600"
    env_file:
      - .env
    depends_on:
      ecommerce-postgresql:
        condition: service_healthy
      ecommerce-redis:
        condition: service_healthy
      ecommerce-kafka:
        condition: service_healthy
      ecommerce-order-service-mq-init:
        condition: service_completed_successfully
      ecommerce-order-service-db-migrate:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          cpus: 1.0
          memory: 1G
    healthcheck:
      test:
        - "CMD-SHELL"
        - "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8002/health')\""
      interval: 5s
      start_period: 15s
      retries: 3
    networks:
      - ecommerce-network
    restart: unless-stopped

  ecommerce-payment-service:
    build:
      context: ./ecommerce_payment_service
      dockerfile: Dockerfile
    image: ecommerce-payment-service:latest
    container_name: ecommerce-payment-service
    ports:
      - "8003:8003"
    environment:
      PORT: "8003"
      SERVICE_NAME: "ecommerce-payment-service"
      DB_DATABASE_URL: "${DB_DATABASE_URL_ECOMMERCE_PAYMENT_SERVICE}"
      KAFKA_BROKERS: "ecommerce-kafka:9092"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://ecommerce-jaeger:4317"
      DEBUG: "true"
      JWT_SECRET: "dev-secret-change-in-production"
      JWT_ALGORITHM: "HS256"
      JWT_EXPIRY: "3600"
    env_file:
      - .env
    depends_on:
      ecommerce-postgresql:
        condition: service_healthy
      ecommerce-kafka:
        condition: service_healthy
      ecommerce-payment-service-mq-init:
        condition: service_completed_successfully
      ecommerce-payment-service-db-migrate:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          cpus: 1.0
          memory: 1G
    healthcheck:
      test:
        - "CMD-SHELL"
        - "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8003/health')\""
      interval: 10s
      start_period: 15s
      retries: 3
    networks:
      - ecommerce-network
    restart: unless-stopped

  ecommerce-shipping-service:
    build:
      context: ./ecommerce_shipping_service
      dockerfile: Dockerfile
    image: ecommerce-shipping-service:latest
    container_name: ecommerce-shipping-service
    ports:
      - "8004:8004"
    environment:
      PORT: "8004"
      SERVICE_NAME: "ecommerce-shipping-service"
      DB_DATABASE_URL: "${DB_DATABASE_URL_ECOMMERCE_SHIPPING_SERVICE}"
      REDIS_URL: "redis://ecommerce-redis:6379/0"
      KAFKA_BROKERS: "ecommerce-kafka:9092"
      INTERNAL_API_TOKEN: "${INTERNAL_API_TOKEN}"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://ecommerce-jaeger:4317"
      DEBUG: "true"
      JWT_SECRET: "dev-secret-change-in-production"
      JWT_ALGORITHM: "HS256"
      JWT_EXPIRY: "3600"
    env_file:
      - .env
    depends_on:
      ecommerce-postgresql:
        condition: service_healthy
      ecommerce-redis:
        condition: service_healthy
      ecommerce-kafka:
        condition: service_healthy
      ecommerce-shipping-service-mq-init:
        condition: service_completed_successfully
      ecommerce-shipping-service-db-migrate:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          cpus: 0.5
          memory: 512M
    healthcheck:
      test:
        - "CMD-SHELL"
        - "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8004/health')\""
      interval: 5s
      start_period: 10s
      retries: 3
    networks:
      - ecommerce-network
    restart: unless-stopped

  ecommerce-postgresql:
    image: postgres:17-alpine
    container_name: ecommerce-postgresql
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: "ecommerce_users"
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD_ECOMMERCE_POSTGRESQL}"
    env_file:
      - .env
    volumes:
      - ecommerce-postgresql-data:/var/lib/postgresql/data
      - ./scripts/init-db/ecommerce-postgresql.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecommerce-network
    restart: "unless-stopped"

  ecommerce-redis:
    image: redis:7-alpine
    container_name: ecommerce-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecommerce-network
    restart: "unless-stopped"

  ecommerce-product-service-docdb:
    image: mongo:8.0
    container_name: ecommerce-product-service-docdb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: "ecommerce_product_reviews"
    volumes:
      - ecommerce-product-service-docdb-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.runCommand(\"ping\").ok"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecommerce-network
    restart: "unless-stopped"

  ecommerce-kafka:
    image: confluentinc/cp-kafka:7.8.0
    container_name: ecommerce-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@ecommerce-kafka:9093"
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://ecommerce-kafka:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecommerce-network
    restart: "unless-stopped"

  ecommerce-user-service-mq-init:
    image: confluentinc/cp-kafka:7.8.0
    container_name: ecommerce-user-service-mq-init
    volumes:
      - ./scripts/init-topics:/scripts/init-topics:ro
    command:
      - "/bin/bash"
      - "/scripts/init-topics/ecommerce-user-service-mq.sh"
    depends_on:
      ecommerce-kafka:
        condition: service_healthy
    networks:
      - ecommerce-network
    restart: "no"

  ecommerce-product-service-mq-init:
    image: confluentinc/cp-kafka:7.8.0
    container_name: ecommerce-product-service-mq-init
    volumes:
      - ./scripts/init-topics:/scripts/init-topics:ro
    command:
      - "/bin/bash"
      - "/scripts/init-topics/ecommerce-product-service-mq.sh"
    depends_on:
      ecommerce-kafka:
        condition: service_healthy
    networks:
      - ecommerce-network
    restart: "no"

  ecommerce-order-service-mq-init:
    image: confluentinc/cp-kafka:7.8.0
    container_name: ecommerce-order-service-mq-init
    volumes:
      - ./scripts/init-topics:/scripts/init-topics:ro
    command:
      - "/bin/bash"
      - "/scripts/init-topics/ecommerce-order-service-mq.sh"
    depends_on:
      ecommerce-kafka:
        condition: service_healthy
    networks:
      - ecommerce-network
    restart: "no"

  ecommerce-payment-service-mq-init:
    image: confluentinc/cp-kafka:7.8.0
    container_name: ecommerce-payment-service-mq-init
    volumes:
      - ./scripts/init-topics:/scripts/init-topics:ro
    command:
      - "/bin/bash"
      - "/scripts/init-topics/ecommerce-payment-service-mq.sh"
    depends_on:
      ecommerce-kafka:
        condition: service_healthy
    networks:
      - ecommerce-network
    restart: "no"

  ecommerce-shipping-service-mq-init:
    image: confluentinc/cp-kafka:7.8.0
    container_name: ecommerce-shipping-service-mq-init
    volumes:
      - ./scripts/init-topics:/scripts/init-topics:ro
    command:
      - "/bin/bash"
      - "/scripts/init-topics/ecommerce-shipping-service-mq.sh"
    depends_on:
      ecommerce-kafka:
        condition: service_healthy
    networks:
      - ecommerce-network
    restart: "no"

  ecommerce-user-service-db-migrate:
    image: ecommerce-user-service:latest
    container_name: ecommerce-user-service-db-migrate
    environment:
      DB_DATABASE_URL: "${DB_DATABASE_URL_ECOMMERCE_USER_SERVICE}"
    env_file:
      - .env
    command:
      - "alembic"
      - "-c"
      - "alembic-db.ini"
      - "upgrade"
      - "head"
    depends_on:
      ecommerce-postgresql:
        condition: service_healthy
    networks:
      - ecommerce-network
    restart: "no"

  ecommerce-product-service-db-migrate:
    image: ecommerce-product-service:latest
    container_name: ecommerce-product-service-db-migrate
    environment:
      DB_DATABASE_URL: "${DB_DATABASE_URL_ECOMMERCE_PRODUCT_SERVICE}"
    env_file:
      - .env
    command:
      - "alembic"
      - "-c"
      - "alembic-db.ini"
      - "upgrade"
      - "head"
    depends_on:
      ecommerce-postgresql:
        condition: service_healthy
    networks:
      - ecommerce-network
    restart: "no"

  ecommerce-order-service-db-migrate:
    image: ecommerce-order-service:latest
    container_name: ecommerce-order-service-db-migrate
    environment:
      DB_DATABASE_URL: "${DB_DATABASE_URL_ECOMMERCE_ORDER_SERVICE}"
    env_file:
      - .env
    command:
      - "alembic"
      - "-c"
      - "alembic-db.ini"
      - "upgrade"
      - "head"
    depends_on:
      ecommerce-postgresql:
        condition: service_healthy
    networks:
      - ecommerce-network
    restart: "no"

  ecommerce-payment-service-db-migrate:
    image: ecommerce-payment-service:latest
    container_name: ecommerce-payment-service-db-migrate
    environment:
      DB_DATABASE_URL: "${DB_DATABASE_URL_ECOMMERCE_PAYMENT_SERVICE}"
    env_file:
      - .env
    command:
      - "alembic"
      - "-c"
      - "alembic-db.ini"
      - "upgrade"
      - "head"
    depends_on:
      ecommerce-postgresql:
        condition: service_healthy
    networks:
      - ecommerce-network
    restart: "no"

  ecommerce-shipping-service-db-migrate:
    image: ecommerce-shipping-service:latest
    container_name: ecommerce-shipping-service-db-migrate
    environment:
      DB_DATABASE_URL: "${DB_DATABASE_URL_ECOMMERCE_SHIPPING_SERVICE}"
    env_file:
      - .env
    command:
      - "alembic"
      - "-c"
      - "alembic-db.ini"
      - "upgrade"
      - "head"
    depends_on:
      ecommerce-postgresql:
        condition: service_healthy
    networks:
      - ecommerce-network
    restart: "no"

  ecommerce-prometheus:
    image: prom/prometheus:v2.49.1
    container_name: ecommerce-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./config/prometheus:/etc/prometheus/rules:ro
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - ecommerce-network
    restart: "unless-stopped"

  ecommerce-jaeger:
    image: jaegertracing/all-in-one:1.53
    container_name: ecommerce-jaeger
    ports:
      - "16686:16686"
      - "14268:14268"
      - "4317:4317"
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:14269/"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - ecommerce-network
    restart: "unless-stopped"

  ecommerce-loki:
    image: grafana/loki:2.9.10
    container_name: ecommerce-loki
    ports:
      - "3100:3100"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3100/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - ecommerce-network
    restart: "unless-stopped"

  ecommerce-alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: ecommerce-alertmanager
    ports:
      - "9093:9093"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:9093/-/healthy || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - ecommerce-network
    restart: "unless-stopped"

  ecommerce-grafana:
    image: grafana/grafana:10.2.3
    container_name: ecommerce-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: "${GRAFANA_ADMIN_USER:-admin}"
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD:-changeme}"
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./config/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      ecommerce-prometheus:
        condition: service_healthy
      ecommerce-jaeger:
        condition: service_healthy
      ecommerce-loki:
        condition: service_healthy
      ecommerce-alertmanager:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - ecommerce-network
    restart: "unless-stopped"

  ecommerce-product-service-minio:
    image: minio/minio:latest
    container_name: ecommerce-product-service-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: "minio"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD_ECOMMERCE_PRODUCT_SERVICE}"
    env_file:
      - .env
    volumes:
      - ecommerce-product-service-minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecommerce-network
    restart: "unless-stopped"

  init-storage-ecommerce-product-service:
    image: minio/mc:RELEASE.2024-01-13T08-44-48Z
    container_name: init-storage-ecommerce-product-service
    environment:
      MINIO_ROOT_USER: "minio"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD_ECOMMERCE_PRODUCT_SERVICE}"
    env_file:
      - .env
    command: mc alias set local http://ecommerce-product-service-minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD && mc mb local/ecommerce-products --ignore-existing && echo "Storage initialization complete"
    depends_on:
      ecommerce-product-service-minio:
        condition: service_healthy
    networks:
      - ecommerce-network
    restart: "no"

  ecommerce-api-gateway:
    image: nginx:1.25-alpine
    container_name: ecommerce-api-gateway
    ports:
      - "80:80"
    volumes:
      - ./config/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      ecommerce-user-service:
        condition: service_healthy
      ecommerce-product-service:
        condition: service_healthy
      ecommerce-order-service:
        condition: service_healthy
      ecommerce-payment-service:
        condition: service_healthy
      ecommerce-shipping-service:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'nginx', '-t']
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - ecommerce-network
    restart: "unless-stopped"

volumes:
  ecommerce-postgresql-data:
    driver: local
  ecommerce-product-service-docdb-data:
    driver: local
  grafana-data:
    driver: local
  ecommerce-product-service-minio-data:
    driver: local

networks:
  ecommerce-network:
    driver: bridge
