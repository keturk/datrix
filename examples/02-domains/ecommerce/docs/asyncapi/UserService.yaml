asyncapi: 3.0.0
info:
  title: ecommerce.UserService Events
  version: 1.0.0
channels:
  UserEvents:
    address: UserEvents
    messages:
      UserRegistered:
        payload:
          type: object
          properties:
            userId:
              type: string
              format: uuid
            email:
              type: string
              format: email
            fullName:
              type: string
          required:
          - userId
          - email
          - fullName
      UserVerified:
        payload:
          type: object
          properties:
            userId:
              type: string
              format: uuid
            email:
              type: string
              format: email
          required:
          - userId
          - email
      UserStatusChanged:
        payload:
          type: object
          properties:
            userId:
              type: string
              format: uuid
            oldStatus:
              $ref: '#/components/schemas/UserStatus'
            newStatus:
              $ref: '#/components/schemas/UserStatus'
          required:
          - userId
          - oldStatus
          - newStatus
      UserLoggedIn:
        payload:
          type: object
          properties:
            userId:
              type: string
              format: uuid
            loginAt:
              type: string
              format: date-time
            ipAddress:
              $ref: '#/components/schemas/String?'
          required:
          - userId
          - loginAt
          - ipAddress
operations:
  publishUserRegistered:
    action: send
    channel:
      $ref: '#/channels/UserEvents'
  publishUserVerified:
    action: send
    channel:
      $ref: '#/channels/UserEvents'
  publishUserStatusChanged:
    action: send
    channel:
      $ref: '#/channels/UserEvents'
  publishUserLoggedIn:
    action: send
    channel:
      $ref: '#/channels/UserEvents'
  onUserRegistered:
    action: receive
    channel:
      $ref: '#/channels/UserEvents'
  onUserVerified:
    action: receive
    channel:
      $ref: '#/channels/UserEvents'
  onUserStatusChanged:
    action: receive
    channel:
      $ref: '#/channels/UserEvents'
  onUserLoggedIn:
    action: receive
    channel:
      $ref: '#/channels/UserEvents'
