test:
  language: typescript
  hosting: docker
  defaultTimeout: 30000
  maxPageSize: 100
  defaultLocale: en-US
  timezone: UTC
  env:
    DEBUG: false
    CORS_ORIGINS: '["*"]'
    SECRETS_BACKEND: environment
    JWT_SECRET: dev-secret-change-in-production
    JWT_ALGORITHM: HS256
    JWT_EXPIRY: 3600
  secrets:
    provider: env
development:
  language: typescript
  hosting: docker
  defaultTimeout: 30000
  maxPageSize: 100
  defaultLocale: en-US
  timezone: UTC
  env:
    DEBUG: false
    CORS_ORIGINS: '["*"]'
    SECRETS_BACKEND: environment
    JWT_SECRET: dev-secret-change-in-production
    JWT_ALGORITHM: HS256
    JWT_EXPIRY: 3600
  secrets:
    provider: env
production:
  language: typescript
  hosting: aws
  defaultTimeout: 30000
  maxPageSize: 100
  defaultLocale: en-US
  timezone: UTC
  region: us-east-1
  secrets:
    provider: vault
    path: secret/ecommerce
