<line x1="64.0" y1="122" x2="336.0" y2="122" stroke="#f0f0f0" stroke-width="0.5"/>
<text x="90.0" y="137.0" class="field-name">description?</text>
<text x="336.0" y="137.0" text-anchor="end" class="field-type">String(500)</text>
<rect x="50.0" y="222.0" width="300.0" height="180.0" rx="6" fill="#ffffff" stroke="#d0d7de" stroke-width="1" filter="url(#shadow)"/>
<rect x="50.0" y="222.0" width="300.0" height="32" rx="6" fill="#24292f"/>
<rect x="50.0" y="248.0" width="300.0" height="6" fill="#24292f"/>
<text x="64.0" y="243.0" class="entity-name">Book</text>
