<line x1="64.0" y1="350.0" x2="336.0" y2="350.0" stroke="#f0f0f0" stroke-width="0.5"/>
<text x="90.0" y="365.0" class="field-name">status</text>
<text x="336.0" y="365.0" text-anchor="end" class="field-type">BookStatus</text>
<line x1="64.0" y1="372.0" x2="336.0" y2="372.0" stroke="#f0f0f0" stroke-width="0.5"/>
