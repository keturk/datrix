<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 430">
<style>
  .entity-name { font: bold 13px "Segoe UI", system-ui, -apple-system, sans-serif; fill: #ffffff; }
  .field-name { font: 11px "Segoe UI", system-ui, -apple-system, sans-serif; fill: #1f2328; }
  .field-type { font: 11px "Segoe UI", system-ui, -apple-system, sans-serif; fill: #656d76; }
  .pk-badge { font: bold 9px "Segoe UI", system-ui, -apple-system, sans-serif; fill: #cf222e; }
  .rel-line { stroke: #8b949e; fill: none; stroke-width: 1.5; }
  .cardinality { font: bold 11px "Segoe UI", system-ui, -apple-system, sans-serif; fill: #57606a; }
  .rel-label { font: italic 10px "Segoe UI", system-ui, -apple-system, sans-serif; fill: #656d76; }
  .title { font: bold 16px "Segoe UI", system-ui, -apple-system, sans-serif; fill: #1f2328; }
  .subtitle { font: 11px "Segoe UI", system-ui, -apple-system, sans-serif; fill: #656d76; }
</style>
<defs>
  <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
    <feDropShadow dx="0" dy="1" stdDeviation="3" flood-color="rgba(0,0,0,0.08)"/>
  </filter>
</defs>
<rect width="400" height="430" fill="white"/>
<text x="28" y="44" class="title">BookService</text>
<text x="28" y="58" class="subtitle">Entity-Relationship Diagram</text>
<path d="M 180.0 152.0 C 180.0 187.0 180.0 187.0 180.0 222.0" class="rel-line"/>
