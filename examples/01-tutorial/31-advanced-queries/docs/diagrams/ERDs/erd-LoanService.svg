<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 246">
<style>
  .entity-name { font: bold 13px "Segoe UI", system-ui, -apple-system, sans-serif; fill: #ffffff; }
  .field-name { font: 11px "Segoe UI", system-ui, -apple-system, sans-serif; fill: #1f2328; }
  .field-type { font: 11px "Segoe UI", system-ui, -apple-system, sans-serif; fill: #656d76; }
  .pk-badge { font: bold 9px "Segoe UI", system-ui, -apple-system, sans-serif; fill: #cf222e; }
  .rel-line { stroke: #8b949e; fill: none; stroke-width: 1.5; }
  .cardinality { font: bold 11px "Segoe UI", system-ui, -apple-system, sans-serif; fill: #57606a; }
  .rel-label { font: italic 10px "Segoe UI", system-ui, -apple-system, sans-serif; fill: #656d76; }
  .title { font: bold 16px "Segoe UI", system-ui, -apple-system, sans-serif; fill: #1f2328; }
  .subtitle { font: 11px "Segoe UI", system-ui, -apple-system, sans-serif; fill: #656d76; }
</style>
<defs>
  <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
    <feDropShadow dx="0" dy="1" stdDeviation="3" flood-color="rgba(0,0,0,0.08)"/>
  </filter>
</defs>
<rect width="400" height="246" fill="white"/>
<text x="28" y="44" class="title">LoanService</text>
<text x="28" y="58" class="subtitle">Entity-Relationship Diagram</text>
<rect x="50.0" y="60" width="300.0" height="158.0" rx="6" fill="#ffffff" stroke="#d0d7de" stroke-width="1" filter="url(#shadow)"/>
<rect x="50.0" y="60" width="300.0" height="32" rx="6" fill="#24292f"/>
<rect x="50.0" y="86" width="300.0" height="6" fill="#24292f"/>
<text x="64.0" y="81.0" class="entity-name">Loan</text>
<text x="90.0" y="115.0" class="field-name">bookId</text>
<text x="336.0" y="115.0" text-anchor="end" class="field-type">UUID</text>
<line x1="64.0" y1="122" x2="336.0" y2="122" stroke="#f0f0f0" stroke-width="0.5"/>
<text x="90.0" y="137.0" class="field-name">memberId</text>
<text x="336.0" y="137.0" text-anchor="end" class="field-type">UUID</text>
<line x1="64.0" y1="144" x2="336.0" y2="144" stroke="#f0f0f0" stroke-width="0.5"/>
<text x="90.0" y="159.0" class="field-name">status</text>
<text x="336.0" y="159.0" text-anchor="end" class="field-type">LoanStatus</text>
<line x1="64.0" y1="166" x2="336.0" y2="166" stroke="#f0f0f0" stroke-width="0.5"/>
<text x="90.0" y="181.0" class="field-name">dueDate</text>
<text x="336.0" y="181.0" text-anchor="end" class="field-type">DateTime</text>
<line x1="64.0" y1="188" x2="336.0" y2="188" stroke="#f0f0f0" stroke-width="0.5"/>
<text x="90.0" y="203.0" class="field-name">returnedAt?</text>
<text x="336.0" y="203.0" text-anchor="end" class="field-type">DateTime</text>
</svg>