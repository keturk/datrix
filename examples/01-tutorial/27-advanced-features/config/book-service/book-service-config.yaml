test:
  platform: compose
  port: 8000
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1216Mi
  healthCheck:
    path: /health
    initialDelay: 30s
development:
  platform: compose
  port: 8000
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1216Mi
  healthCheck:
    path: /health
    initialDelay: 30s
production:
  platform: ecs-fargate
  port: 8000
  strategy:
    rolling:
      maxUnavailable: 25%
  replicas: 2
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  healthCheck:
    path: /health
    initialDelay: 30s
