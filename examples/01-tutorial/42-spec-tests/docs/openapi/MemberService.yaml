openapi: 3.1.0
info:
  title: library.MemberService API
  version: 1.0.0
paths:
  /api/v1/members/members:
    get:
      operationId: list_members
      summary: list_members
      security:
      - bearerAuth: []
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
    post:
      operationId: create_member
      summary: create_member
      security:
      - bearerAuth: []
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
  /api/v1/members/members/:id:
    get:
      operationId: get_member
      summary: get_member
      security:
      - bearerAuth: []
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
    put:
      operationId: update_member
      summary: update_member
      security:
      - bearerAuth: []
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
    delete:
      operationId: delete_member
      summary: delete_member
      security:
      - bearerAuth: []
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
  /api/v1/members/search:
    get:
      operationId: get
      summary: get
      security:
      - bearerAuth: []
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
  /api/v1/members/by-membership/:membershipNumber:
    get:
      operationId: get
      summary: get
      security:
      - bearerAuth: []
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
  /api/v1/members/internal/:id:
    get:
      operationId: get
      summary: get
      security:
      - bearerAuth: []
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
  /api/v1/members/internal/profile/:id:
    get:
      operationId: get
      summary: get
      security:
      - bearerAuth: []
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
components:
  schemas:
    Member:
      type: object
      properties:
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        id:
          type: string
          format: uuid
        firstName:
          type: string
          maxLength: 100
        lastName:
          type: string
          maxLength: 100
        email:
          type: string
          format: email
        phone:
          $ref: '#/components/schemas/Phone?'
        passwordHash:
          $ref: '#/components/schemas/Password?'
        membershipNumber:
          type: string
          maxLength: 20
        membershipType:
          $ref: '#/components/schemas/MembershipType'
        dateOfBirth:
          $ref: '#/components/schemas/Date?'
        membershipExpiry:
          $ref: '#/components/schemas/Date?'
        ssn:
          $ref: '#/components/schemas/String(11)?'
        libraryCardNumber:
          $ref: '#/components/schemas/String(16)?'
        lastLoginIp:
          $ref: '#/components/schemas/IPAddress?'
      required:
      - createdAt
      - updatedAt
      - id
      - firstName
      - lastName
      - email
      - membershipNumber
      - membershipType
    MemberPreferences:
      type: object
      properties:
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        id:
          type: string
          format: uuid
        language:
          type: string
          maxLength: 10
        timezone:
          type: string
          maxLength: 50
        emailNotifications:
          type: boolean
        smsNotifications:
          type: boolean
        preferences:
          type: object
      required:
      - createdAt
      - updatedAt
      - id
      - language
      - timezone
      - emailNotifications
      - smsNotifications
      - preferences
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
