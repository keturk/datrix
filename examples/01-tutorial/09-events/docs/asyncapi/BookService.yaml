asyncapi: 3.0.0
info:
  title: library.BookService Events
  version: 1.0.0
channels:
  BookEvents:
    address: BookEvents
    messages:
      BookAdded:
        payload:
          type: object
          properties:
            bookId:
              type: string
              format: uuid
            title:
              type: string
          required:
          - bookId
          - title
      BookStatusChanged:
        payload:
          type: object
          properties:
            bookId:
              type: string
              format: uuid
            oldStatus:
              $ref: '#/components/schemas/BookStatus'
            newStatus:
              $ref: '#/components/schemas/BookStatus'
          required:
          - bookId
          - oldStatus
          - newStatus
operations:
  publishBookAdded:
    action: send
    channel:
      $ref: '#/channels/BookEvents'
  publishBookStatusChanged:
    action: send
    channel:
      $ref: '#/channels/BookEvents'
  onBookAdded:
    action: receive
    channel:
      $ref: '#/channels/BookEvents'
  onBookStatusChanged:
    action: receive
    channel:
      $ref: '#/channels/BookEvents'
