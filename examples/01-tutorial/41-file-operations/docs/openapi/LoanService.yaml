openapi: 3.1.0
info:
  title: library.LoanService API
  version: 1.0.0
paths:
  /api/v1/loans:
    post:
      operationId: post
      summary: post
      security:
      - bearerAuth: []
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
  /api/v1/loans/member/:memberId:
    get:
      operationId: get
      summary: get
      security:
      - bearerAuth: []
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
  /api/v1/loans/webhook/overdue-notification:
    post:
      operationId: post
      summary: post
      security:
      - bearerAuth: []
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
  /api/v1/loans/:id/return:
    post:
      operationId: post
      summary: post
      security:
      - bearerAuth: []
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
components:
  schemas:
    Loan:
      type: object
      properties:
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        id:
          type: string
          format: uuid
        bookId:
          type: string
          format: uuid
        memberId:
          type: string
          format: uuid
        status:
          $ref: '#/components/schemas/LoanStatus'
        dueDate:
          type: string
          format: date-time
        returnedAt:
          $ref: '#/components/schemas/DateTime?'
      required:
      - createdAt
      - updatedAt
      - id
      - bookId
      - memberId
      - status
      - dueDate
    IdempotencyKey:
      type: object
      properties:
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        id:
          type: string
          format: uuid
        key:
          type: string
          maxLength: 100
        operation:
          type: string
          maxLength: 50
        resourceId:
          $ref: '#/components/schemas/UUID?'
        response:
          $ref: '#/components/schemas/JSON?'
        expiresAt:
          type: string
          format: date-time
      required:
      - createdAt
      - updatedAt
      - id
      - key
      - operation
      - expiresAt
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
