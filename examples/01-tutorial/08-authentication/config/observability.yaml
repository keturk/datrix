test:
  metrics:
    provider: prometheus
    endpoint: /metrics
    includeDefault: true
  tracing:
    provider: jaeger
    samplingRate: 0.1
  logging:
    level: info
    format: json
    provider: loki
  visualization:
    provider: grafana
  alerting:
    provider: alertmanager
development:
  metrics:
    provider: prometheus
    endpoint: /metrics
    includeDefault: true
  tracing:
    provider: jaeger
    samplingRate: 0.1
  logging:
    level: info
    format: json
    provider: loki
  visualization:
    provider: grafana
production:
  metrics:
    provider: prometheus
    endpoint: /metrics
    includeDefault: true
  tracing:
    provider: jaeger
    endpoint: ${JAEGER_URL}
    samplingRate: 0.1
  logging:
    level: info
    format: json
