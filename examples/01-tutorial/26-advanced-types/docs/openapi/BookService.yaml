components:
  schemas:
    Category:
      type: object
      properties:
        id:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        name:
          type: string
          maxLength: 100
        description:
          $ref: '#/components/schemas/String(500)?'
      required:
      - id
      - createdAt
      - updatedAt
      - name
    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        email:
          type: string
          maxLength: 255
        passwordHash:
          type: string
          format: password
        role:
          $ref: '#/components/schemas/UserRole'
      required:
      - id
      - createdAt
      - updatedAt
      - email
      - passwordHash
      - role
    Tag:
      type: object
      properties:
        id:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        name:
          type: string
          maxLength: 50
        description:
          $ref: '#/components/schemas/String(200)?'
      required:
      - id
      - createdAt
      - updatedAt
      - name
    BookTag:
      type: object
      properties:
        id:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
      - id
      - createdAt
      - updatedAt
    Branch:
      type: object
      properties:
        id:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        name:
          type: string
          maxLength: 200
        latitude:
          $ref: '#/components/schemas/Latitude'
        longitude:
          $ref: '#/components/schemas/Longitude'
        country:
          $ref: '#/components/schemas/CountryCode'
        postalCode:
          $ref: '#/components/schemas/PostalCode?'
      required:
      - id
      - createdAt
      - updatedAt
      - name
      - latitude
      - longitude
      - country
    ShelfLocation:
      type: object
      properties:
        id:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        aisle:
          type: string
          maxLength: 50
        shelf:
          type: string
          maxLength: 10
        capacity:
          $ref: '#/components/schemas/Integer'
      required:
      - id
      - createdAt
      - updatedAt
      - aisle
      - shelf
      - capacity
    Book:
      type: object
      properties:
        id:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        title:
          type: string
          maxLength: 200
        isbn:
          type: string
        author:
          type: string
          maxLength: 100
        publicationYear:
          $ref: '#/components/schemas/Integer'
        status:
          $ref: '#/components/schemas/BookStatus'
        format:
          $ref: '#/components/schemas/BookFormat'
        catalogNumber:
          $ref: '#/components/schemas/String(50)?'
        keywords:
          type: array
          items:
            type: string
        rating:
          $ref: '#/components/schemas/Decimal(3, 2)'
        price:
          $ref: '#/components/schemas/Decimal(10, 2)'
        metadata:
          $ref: '#/components/schemas/Map<String, String>'
        tags:
          $ref: '#/components/schemas/Set<String>'
      required:
      - id
      - createdAt
      - updatedAt
      - title
      - isbn
      - author
      - publicationYear
      - status
      - format
      - keywords
      - rating
      - price
      - metadata
      - tags
    Review:
      type: object
      properties:
        id:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        rating:
          $ref: '#/components/schemas/Integer'
        comment:
          $ref: '#/components/schemas/Text?'
      required:
      - id
      - createdAt
      - updatedAt
      - rating
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
